<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>KataClimb · Agenda v3.2</title>
<style>
  :root { --bg:#F5F1EB; --card:#fff; --ink:#2C2418; --gold:#C49520; --muted:#5E5548; --muted2:#8A7F6F; }
  * { box-sizing: border-box; }
  body { margin:0; padding:2rem; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); font-size:17px; line-height:1.45; }
  .wrap { max-width:1100px; margin:0 auto; }
  h1 { margin:0 0 .3rem; font-size:2rem; font-weight:700; }
  .sub { color:var(--muted); margin-bottom:2rem; font-size:1rem; font-weight:600; }
  .bar { display:flex; justify-content:space-between; align-items:center; gap:.8rem; background:var(--card); padding:1.2rem 1.5rem; border-radius:12px; margin-bottom:1.2rem; box-shadow:0 2px 8px rgba(44,36,24,.05); flex-wrap:wrap; }
  .bar-left, .bar-right { display:flex; align-items:center; gap:.8rem; }
  .bar button { padding:.6rem 1.2rem; border:1px solid var(--gold); background:transparent; color:var(--gold); border-radius:8px; cursor:pointer; font-weight:700; font-size:15px; }
  .bar button:hover { background:var(--gold); color:#fff; }
  .range { font-weight:700; font-size:17px; color:var(--ink); }
  .tipo-select { padding:.55rem .8rem; border:1px solid var(--gold); border-radius:8px; background:#fff; color:var(--ink); font-weight:700; font-size:15px; cursor:pointer; font-family:inherit; }
  .grid { display:grid; gap:1rem; }
  .slot { background:var(--card); padding:1.2rem 1.4rem; border-radius:12px; border-left:5px solid var(--gold); display:grid; grid-template-columns:220px 1fr auto auto; gap:1.2rem; align-items:center; box-shadow:0 1px 4px rgba(44,36,24,.04); }
  .slot.passato { opacity:.55; border-left-color:#bbb; }
  .slot strong { display:block; margin-bottom:.25rem; font-size:17px; color:var(--ink); }
  .ora { color:var(--gold); font-weight:700; font-size:1.2rem; }
  .ist { color:var(--muted); font-size:1rem; font-weight:600; }
  .prenot { font-size:1rem; color:var(--ink); line-height:1.55; }
  .prenot em { color:var(--muted); font-style:normal; font-size:.9em; font-weight:600; }
  .posti { font-size:1.25rem; font-weight:700; padding:.5rem 1rem; border-radius:8px; background:var(--bg); color:var(--ink); }
  .posti.pieno { color:#c00; }
  .btn-prenota { padding:.7rem 1.3rem; background:var(--gold); color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size:15px; }
  .btn-prenota:hover { filter:brightness(1.05); }
  .empty,.err { background:var(--card); padding:2.5rem; text-align:center; border-radius:12px; color:var(--muted); font-size:16px; font-weight:600; }
  .err { color:#c00; border:1px solid #c00; }
  .login-box { background:var(--card); padding:3rem 2rem; text-align:center; border-radius:14px; max-width:460px; margin:3rem auto; }
  .login-box h2 { margin-top:0; font-size:1.6rem; }
  .btn-google { display:inline-flex; align-items:center; gap:.7rem; padding:.9rem 1.6rem; background:#fff; border:1px solid #ddd; border-radius:8px; cursor:pointer; font-size:1.05rem; font-weight:600; color:#3c4043; transition:box-shadow .15s; }
  .btn-google:hover { box-shadow:0 1px 6px rgba(0,0,0,.15); }
  .btn-google svg { width:22px; height:22px; }
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(44,36,24,.65); z-index:1000; align-items:center; justify-content:center; }
  .modal-bg.show { display:flex; }
  .modal { background:var(--bg); padding:2.2rem; border-radius:14px; max-width:560px; width:92%; max-height:92vh; overflow-y:auto; }
  .modal h3 { margin-top:0; font-size:1.4rem; }
  .modal label { display:block; margin:1.1rem 0 .4rem; font-weight:700; font-size:1rem; color:var(--ink); text-transform:uppercase; letter-spacing:.5px; }
  .modal select, .modal input, .modal textarea { width:100%; padding:.75rem .9rem; border:1px solid var(--gold); border-radius:8px; background:#fff; font-size:1.05rem; font-family:inherit; color:var(--ink); }
  .modal textarea { resize:vertical; min-height:90px; }
  .modal-actions { margin-top:1.6rem; display:flex; gap:.6rem; justify-content:flex-end; }
  .modal-actions button { padding:.75rem 1.4rem; border-radius:8px; cursor:pointer; font-weight:700; font-size:15px; }
  .modal-actions button:disabled { cursor:not-allowed; opacity:.5; }
  .btn-ann { border:1px solid var(--ink); background:transparent; color:var(--ink); }
  .btn-ok { border:none; background:var(--gold); color:#fff; }
  .nuovo-lead-box { background:#fff; padding:1.2rem; border-radius:10px; margin-top:.5rem; border:1px dashed var(--gold); }
  .msg-ok { background:#e7f5e7; color:#1b6b1b; padding:1rem; border-radius:8px; margin-top:1rem; font-size:15px; font-weight:600; }
  .msg-err { background:#fce; color:#c00; padding:1rem; border-radius:8px; margin-top:1rem; white-space:pre-wrap; font-size:14px; font-weight:600; }
  .userbar { text-align:right; color:var(--muted); font-size:15px; font-weight:600; margin-bottom:1rem; }
  .userbar a { color:var(--gold); cursor:pointer; text-decoration:underline; font-weight:700; }
  @media(min-width:1024px){
    body { font-size:19px; }
    h1 { font-size:2.4rem; }
    .sub { font-size:1.15rem; }
    .range { font-size:19px; }
    .bar button { font-size:17px; padding:.7rem 1.4rem; }
    .tipo-select { font-size:17px; padding:.65rem .9rem; }
    .slot strong { font-size:20px; }
    .ora { font-size:1.4rem; }
    .ist { font-size:1.1rem; }
    .prenot { font-size:1.1rem; }
    .posti { font-size:1.4rem; padding:.6rem 1.2rem; }
    .btn-prenota { font-size:17px; padding:.8rem 1.6rem; }
    .modal h3 { font-size:1.6rem; }
    .modal label { font-size:1.05rem; }
    .modal select, .modal input, .modal textarea { font-size:1.1rem; padding:.85rem 1rem; }
    .modal-actions button { font-size:17px; padding:.85rem 1.6rem; }
    .userbar { font-size:17px; }
    .empty,.err { font-size:18px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title">Agenda · Prima lezione</h1>
  <div id="sub" class="sub">v3.2</div>

  <div id="userbar" class="userbar" style="display:none"></div>

  <div id="login-container"></div>
  <div id="app-container" style="display:none">
    <div class="bar">
      <div class="bar-left">
        <select id="tipo-select" class="tipo-select">
          <option value="prima_lezione">Prima lezione</option>
          <option value="open">Prima lezione 1 · Open</option>
          <option value="advance" disabled>Prima lezione 2 · Advance (presto)</option>
          <option value="intro_corda" disabled>Prima lezione 3 · Intro corda (presto)</option>
          <option value="evo_corda" disabled>Prima lezione 4 · Evo corda (presto)</option>
        </select>
      </div>
      <div class="bar-right">
        <button id="prev">← Settimana prec.</button>
        <div class="range" id="range">…</div>
        <button id="next">Settimana succ. →</button>
      </div>
    </div>
    <div id="grid" class="grid"><div class="empty">Caricamento…</div></div>
  </div>
</div>

<div id="modal" class="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Prenota prima lezione</h3>
    <div id="slot-info" style="color:var(--muted); font-size:1rem; font-weight:600"></div>

    <label>Seleziona lead</label>
    <select id="lead-select">
      <option value="">— seleziona —</option>
    </select>

    <div id="nuovo-lead" class="nuovo-lead-box" style="display:none">
      <strong style="font-size:1.1rem; font-weight:700">Nuovo lead</strong>
      <label>Nome *</label><input id="nl-nome" type="text">
      <label>Cognome</label><input id="nl-cognome" type="text" placeholder="opzionale">
      <label>Telefono</label><input id="nl-tel" type="tel" placeholder="opzionale">
      <label>Email</label><input id="nl-email" type="email" placeholder="opzionale">
      <label>Fonte</label>
      <select id="nl-fonte"><option value="">— seleziona —</option></select>
      <label>Note</label>
      <textarea id="nl-note" placeholder="Es: già arrampicava in passato, gli ho spiegato che Open è diverso..."></textarea>
    </div>

    <div id="modal-msg"></div>

    <div class="modal-actions">
      <button class="btn-ann" id="btn-annulla">Annulla</button>
      <button class="btn-ok" id="btn-conferma">Conferma prenotazione</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = 'https://wbtougychlhnlcnonqge.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidG91Z3ljaGxobmxjbm9ucWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTQ0MTUsImV4cCI6MjA5MDk5MDQxNX0.QwYWbaOkquJCwOHV6e9w38bLGEO-iNzuH7mwBVgTa9E';
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  const GIORNI = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
  const LABELS = {
    prima_lezione: { h1:'Agenda · Prima lezione', sub:'Prima lezione', modal:'Prenota prima lezione' },
    open: { h1:'Agenda · Prima lezione 1 (Open)', sub:'Prima lezione 1 · Open', modal:'Prenota prima lezione 1 (Open)' }
  };

  let offset = 0;
  let currentSlot = null;
  let currentTipo = 'prima_lezione';
  let fontiCache = [];

  async function checkAuth() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      document.getElementById('login-container').style.display = 'none';
      document.getElementById('app-container').style.display = 'block';
      const ub = document.getElementById('userbar');
      ub.style.display = 'block';
      ub.innerHTML = `Loggato come <strong>${session.user.email}</strong> · <a id="logout-link">logout</a>`;
      document.getElementById('logout-link').onclick = async () => { await sb.auth.signOut(); location.reload(); };
      await caricaFonti();
      render();
    } else {
      showLogin();
    }
  }

  function showLogin() {
    document.getElementById('login-container').innerHTML = `
      <div class="login-box">
        <h2>Login richiesto</h2>
        <p style="color:var(--muted)">Accedi con il tuo account Google per gestire le prenotazioni.</p>
        <button class="btn-google" id="btn-google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Accedi con Google
        </button>
        <div id="login-msg" style="margin-top:1rem"></div>
      </div>`;
    document.getElementById('btn-google').onclick = async () => {
      // Uso origin+pathname per evitare il doppio hash (##access_token) in incognito.
      const cleanUrl = window.location.origin + window.location.pathname;
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: cleanUrl }
      });
      if (error) document.getElementById('login-msg').innerHTML = `<div class="msg-err">${error.message}</div>`;
    };
  }

  function lunSett(off) {
    const d = new Date(); const dow = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - dow + off * 7); d.setHours(0,0,0,0); return d;
  }
  const addG = (d,n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
  const isoD = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };
  const fmt  = d => d.toLocaleDateString('it-IT', {day:'2-digit', month:'short'});

  // Traduce funnel_stage in etichetta leggibile per la segreteria.
  // Mappa coerente col portale_v2 (FUNNEL_LABEL).
  const FUNNEL_LABEL_MAP = {
    nuovo:'Nuovo', contattato:'Contattato', da_riprogrammare:'Da riprogrammare',
    prenotato_prima_lezione:'Prenotato prima lezione', fatta_prima_lezione:'Prima lezione fatta',
    prenotato_open:'Prenotato Open', iscritto_open:'Iscritto Open', concluso_open:'Concluso Open',
    prenotato_advance:'Prenotato Advance', iscritto_advance:'Iscritto Advance', concluso_advance:'Concluso Advance',
    prenotato_intro:'Prenotato Intro', iscritto_intro:'Iscritto Intro', concluso_intro:'Concluso Intro',
    prenotato_evo:'Prenotato Evo', iscritto_evo:'Iscritto Evo', concluso_evo:'Concluso Evo',
    concluso_lavorato:'Lavorato',
    prenotato_monitor:'Prenotato Monitor', iscritto_monitor:'Iscritto Monitor', concluso_monitor:'Concluso Monitor',
    prenotato_assistente:'Prenotato Assistente', iscritto_assistente:'Iscritto Assistente', concluso_assistente:'Concluso Assistente',
    prenotato_istruttore_jr:'Prenotato Istr. Jr', iscritto_istruttore_jr:'Iscritto Istr. Jr', concluso_istruttore_jr:'Concluso Istr. Jr',
    prenotato_istruttore_senior:'Prenotato Istr. Senior', iscritto_istruttore_senior:'Iscritto Istr. Senior', concluso_istruttore_senior:'Istruttore Senior',
    maestro_di_cordata:'Maestro di Cordata',
    perso:'Perso', ibernato:'Ibernato'
  };
  function labelStage(stage) {
    if (!stage) return '—';
    return FUNNEL_LABEL_MAP[stage] || stage;
  }

  async function caricaFonti() {
    const { data, error } = await sb.from('crm_lead_sources')
      .select('code, label').eq('attivo', true).order('ordine');
    if (error) { console.error('Errore caricaFonti:', error); return; }
    fontiCache = data || [];
  }

  async function caricaSlot() {
    const { data, error } = await sb.from('corsi_attivi_settimanali')
      .select('id, giorno_settimana, ora_inizio, ora_fine, capienza_max, istruttori(nome)')
      .eq('tipo_corso', currentTipo).eq('status','attivo')
      .order('giorno_settimana').order('ora_inizio');
    if (error) throw error; return data || [];
  }

  async function caricaPrenot(dal, al) {
    // Legge tutte le prenotazioni della settimana e filtra per tipo_corso dello slot.
    // Questo evita doppie query — slot già sono filtrati, qui prendiamo solo le loro prenotazioni.
    const { data, error } = await sb.from('prenotazioni_prima_lezione')
      .select('id, slot_id, data_lezione, lead_id, presente, crm_leads(nome, cognome, funnel_stage)')
      .gte('data_lezione', isoD(dal)).lte('data_lezione', isoD(al));
    if (error) throw error; return data || [];
  }

  async function caricaLeadsPrenotabili() {
    // Per Prima lezione (livello 0): lead ancora nel funnel ingresso.
    // Per Prima lezione 1 (Open): SOLO chi ha fatto la Prima lezione (livello 0) e non ha ancora prenotato/iniziato Open.
    const stagesAccademia = ['nuovo','contattato','da_riprogrammare','prenotato_prima_lezione'];
    const stagesOpen = ['fatta_prima_lezione'];
    const stages = currentTipo === 'open' ? stagesOpen : stagesAccademia;

    const { data: leads, error: lErr } = await sb.from('crm_leads')
      .select('id, nome, cognome, telefono, funnel_stage')
      .in('funnel_stage', stages)
      .order('created_at', { ascending: false });
    if (lErr) throw lErr;
    if (!leads || leads.length === 0) return [];

    // Escludi chi ha già una prenotazione futura attiva (qualsiasi tipo) per non creare doppioni.
    const oggi = new Date(); oggi.setHours(0,0,0,0);
    const { data: prenot, error: pErr } = await sb.from('prenotazioni_prima_lezione')
      .select('lead_id, slot_id')
      .in('lead_id', leads.map(l => l.id))
      .gte('data_lezione', isoD(oggi))
      .or('presente.is.null,presente.eq.true');
    if (pErr) throw pErr;

    if (!prenot || prenot.length === 0) return leads;

    // Per decidere se escludere, serve sapere il tipo_corso dello slot già prenotato.
    const slotIds = [...new Set(prenot.map(p => p.slot_id))];
    const { data: slotInfo, error: sErr } = await sb.from('corsi_attivi_settimanali')
      .select('id, tipo_corso')
      .in('id', slotIds);
    if (sErr) throw sErr;

    const tipoBySlot = Object.fromEntries((slotInfo || []).map(s => [s.id, s.tipo_corso]));
    // Escludi un lead se ha già una prenotazione futura dello STESSO tipo_corso del calendario corrente.
    const leadsConPrenotStessoTipo = new Set(
      prenot.filter(p => tipoBySlot[p.slot_id] === currentTipo).map(p => p.lead_id)
    );
    return leads.filter(l => !leadsConPrenotStessoTipo.has(l.id));
  }

  async function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="empty">Caricamento…</div>';
    const lun = lunSett(offset); const dom = addG(lun, 6);
    document.getElementById('range').textContent = `Settimana ${fmt(lun)} – ${fmt(dom)}`;

    const labels = LABELS[currentTipo];
    document.getElementById('title').textContent = labels.h1;
    document.getElementById('sub').textContent = `v3.2 · ${labels.sub}`;
    document.getElementById('modal-title').textContent = labels.modal;

    try {
      const [slots, prenot] = await Promise.all([caricaSlot(), caricaPrenot(lun, dom)]);
      if (!slots.length) { grid.innerHTML = `<div class="empty">Nessuno slot configurato per ${labels.sub}.</div>`; return; }
      const slotIds = new Set(slots.map(s => s.id));
      const prenotFiltrate = prenot.filter(p => slotIds.has(p.slot_id));
      const oggi = new Date(); oggi.setHours(0,0,0,0);
      grid.innerHTML = '';
      slots.forEach(s => {
        const data = addG(lun, s.giorno_settimana - 1);
        const di = isoD(data);
        const p = prenotFiltrate.filter(x => x.slot_id === s.id && x.data_lezione === di);
        const liberi = s.capienza_max - p.length;
        const passato = data < oggi;
        const label = `${GIORNI[s.giorno_settimana-1]} ${fmt(data)} · ${s.ora_inizio.slice(0,5)}–${s.ora_fine.slice(0,5)} · ${s.istruttori?.nome||''}`;
        const card = document.createElement('div');
        card.className = 'slot' + (passato ? ' passato' : '');
        card.innerHTML = `
          <div>
            <strong>${GIORNI[s.giorno_settimana-1]} ${fmt(data)}</strong>
            <div class="ora">${s.ora_inizio.slice(0,5)}–${s.ora_fine.slice(0,5)}</div>
            <div class="ist">${s.istruttori?.nome || '—'}</div>
          </div>
          <div class="prenot">${p.length === 0 ? '<em>Nessuna prenotazione</em>' :
            p.map(x => {
              const nome = `${x.crm_leads?.nome||''} ${x.crm_leads?.cognome||''}`.trim() || '—';
              const stageLabel = labelStage(x.crm_leads?.funnel_stage);
              return `• <a href="portale_v2.html?lead_id=${x.lead_id}" target="_blank" style="color:inherit;text-decoration:underline;text-underline-offset:2px">${nome}</a> <em>(${stageLabel})</em>`;
            }).join('<br>')}
          </div>
          <div class="posti${liberi === 0 ? ' pieno' : ''}">${p.length}/${s.capienza_max}</div>
          <div>${(!passato && liberi > 0)
            ? `<button class="btn-prenota" data-slot="${s.id}" data-data="${di}" data-label="${label.replace(/"/g,'&quot;')}">+ Prenota</button>`
            : ''}</div>`;
        grid.appendChild(card);
      });
      grid.querySelectorAll('.btn-prenota').forEach(b => b.onclick = () => apriModal(b.dataset.slot, b.dataset.data, b.dataset.label));
    } catch (err) {
      grid.innerHTML = `<div class="err"><strong>Errore</strong><pre>${err.message||err}</pre></div>`;
    }
  }

  async function apriModal(slotId, dataIso, label) {
    currentSlot = { id: slotId, data_lezione: dataIso, label };
    document.getElementById('slot-info').textContent = label;
    document.getElementById('modal-msg').innerHTML = '';
    document.getElementById('nuovo-lead').style.display = 'none';
    ['nl-nome','nl-cognome','nl-tel','nl-email','nl-note'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('nl-fonte').value = '';

    const fonteSel = document.getElementById('nl-fonte');
    fonteSel.innerHTML = '<option value="">— seleziona —</option>' +
      fontiCache.map(f => `<option value="${f.code}">${f.label}</option>`).join('');

    const leads = await caricaLeadsPrenotabili();
    const sel = document.getElementById('lead-select');
    // "Aggiungi nuovo lead" solo su Prima lezione. Sul calendario Open un nuovo lead non è prenotabile direttamente.
    const nuovoLeadOpt = currentTipo === 'prima_lezione'
      ? '<option value="__new__">➕ Aggiungi nuovo lead…</option>'
      : '';
    sel.innerHTML = '<option value="">— seleziona —</option>' +
      leads.map(l => `<option value="${l.id}">${l.nome} ${l.cognome||''} · ${l.telefono||'no tel'} · ${labelStage(l.funnel_stage)}</option>`).join('') +
      nuovoLeadOpt;
    sel.onchange = () => {
      document.getElementById('nuovo-lead').style.display = sel.value === '__new__' ? 'block' : 'none';
    };
    document.getElementById('modal').classList.add('show');
  }
  document.getElementById('btn-annulla').onclick = () => document.getElementById('modal').classList.remove('show');

  // Traduce gli errori Postgres/Supabase in messaggi italiani leggibili per la segreteria.
  // I codici fanno riferimento ai constraint DB creati il 23 apr 2026
  // (uniq_crm_leads_telefono, trg_enforce_slot_capacity, uniq_prenotazione_slot_lead_data).
  function traduciErrore(err, contesto) {
    const code = err?.code || '';
    const emsg = err?.message || '';
    const details = err?.details || '';

    // 23505 = unique_violation
    if (code === '23505') {
      if (emsg.includes('uniq_crm_leads_telefono') || details.includes('telefono')) {
        return 'Esiste già un lead con questo numero di telefono. Cercalo nella lista "Seleziona lead" invece di crearne uno nuovo.';
      }
      if (emsg.includes('uniq_prenotazione_slot_lead_data') || details.includes('slot_id') && details.includes('data_lezione')) {
        return 'Questo lead è già prenotato su questo slot per questa data.';
      }
      return 'Dato duplicato. ' + (details || emsg);
    }

    // P0001 = raise_exception (trigger enforce_slot_capacity)
    if (code === 'P0001' && emsg.includes('Slot pieno')) {
      return 'Lo slot si è appena riempito mentre stavi prenotando. Ricarica per vedere la situazione aggiornata.';
    }

    // Fallback con prefisso di contesto (es. "Creazione lead", "Prenotazione", "Update stato")
    return (contesto ? contesto + ': ' : '') + (emsg || 'errore sconosciuto');
  }

  document.getElementById('btn-conferma').onclick = async () => {
    const btn = document.getElementById('btn-conferma');
    const btnAnn = document.getElementById('btn-annulla');
    const msg = document.getElementById('modal-msg');
    msg.innerHTML = '';
    const sel = document.getElementById('lead-select').value;
    if (!sel) { msg.innerHTML = '<div class="msg-err">Seleziona un lead o aggiungine uno nuovo.</div>'; return; }

    // Validazione pre-submit del nuovo lead: meglio farla prima di disabilitare i bottoni.
    let nuovoLeadData = null;
    if (sel === '__new__') {
      const nome = document.getElementById('nl-nome').value.trim();
      if (!nome) { msg.innerHTML = '<div class="msg-err">Il nome è obbligatorio.</div>'; return; }
      nuovoLeadData = {
        nome,
        cognome: document.getElementById('nl-cognome').value.trim() || null,
        telefono: document.getElementById('nl-tel').value.trim() || null,
        email: document.getElementById('nl-email').value.trim() || null,
        fonte: document.getElementById('nl-fonte').value || 'manuale',
        note: document.getElementById('nl-note').value.trim() || null,
        funnel_stage: 'nuovo'
      };
    }

    // --- Disabilita entrambi i bottoni per prevenire doppio click ---
    // Questa è la difesa di prima linea contro il bug delle 30 prenotazioni duplicate.
    // Il DB ha comunque i constraint di sicurezza (uniq_crm_leads_telefono,
    // trg_enforce_slot_capacity, uniq_prenotazione_slot_lead_data) come difesa in profondità.
    const btnOriginalText = btn.textContent;
    btn.disabled = true;
    btnAnn.disabled = true;
    btn.textContent = 'Prenotazione…';
    btn.style.opacity = '0.6';
    btn.style.cursor = 'wait';

    let leadId = sel;
    let leadAppenaCreato = null; // per rollback in caso di fallimento della prenotazione

    try {
      if (sel === '__new__') {
        const { data: nuovo, error: e1 } = await sb.from('crm_leads')
          .insert(nuovoLeadData).select('id').single();
        if (e1) throw { ...e1, _contesto: 'Creazione lead' };
        leadId = nuovo.id;
        leadAppenaCreato = nuovo.id;
      }

      const { error: e2 } = await sb.from('prenotazioni_prima_lezione').insert({
        lead_id: leadId, slot_id: currentSlot.id, data_lezione: currentSlot.data_lezione
      });
      if (e2) throw { ...e2, _contesto: 'Prenotazione' };

      // Il nuovo funnel_stage dipende dal calendario su cui si sta prenotando.
      // Prima lezione (livello 0) → prenotato_prima_lezione
      // Open (Prima lezione 1) → prenotato_open
      // (In futuro: advance → prenotato_advance, intro → prenotato_intro, evo → prenotato_evo)
      const nuovoStage = 'prenotato_' + (currentTipo === 'prima_lezione' ? 'prima_lezione' : currentTipo);

      const { error: e3 } = await sb.from('crm_leads').update({
        funnel_stage: nuovoStage,
        prossima_azione_il: currentSlot.data_lezione
      }).eq('id', leadId);
      if (e3) throw { ...e3, _contesto: 'Update stato' };

      msg.innerHTML = '<div class="msg-ok">✓ Prenotazione creata. Aggiorno griglia…</div>';
      setTimeout(() => { document.getElementById('modal').classList.remove('show'); render(); }, 1000);
    } catch (err) {
      // Se avevamo appena creato un nuovo lead e la prenotazione è fallita,
      // rimuovi il lead orfano per non lasciare detritus in crm_leads.
      // (Non blocchiamo la UI se il cleanup fallisce, è best-effort.)
      if (leadAppenaCreato && err._contesto === 'Prenotazione') {
        sb.from('crm_leads').delete().eq('id', leadAppenaCreato)
          .then(({ error }) => { if (error) console.warn('Cleanup lead orfano fallito:', error); });
      }
      msg.innerHTML = `<div class="msg-err">${traduciErrore(err, err._contesto)}</div>`;
    } finally {
      btn.disabled = false;
      btnAnn.disabled = false;
      btn.textContent = btnOriginalText;
      btn.style.opacity = '';
      btn.style.cursor = '';
    }
  };

  document.getElementById('prev').onclick = () => { offset--; render(); };
  document.getElementById('next').onclick = () => { offset++; render(); };
  document.getElementById('tipo-select').onchange = (e) => { currentTipo = e.target.value; offset = 0; render(); };

  checkAuth();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && document.getElementById('app-container').style.display !== 'none') {
      render();
    }
  });
  sb.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') checkAuth();
  });
</script>
</body>
</html>

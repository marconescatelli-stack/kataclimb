<!DOCTYPE html>
<html lang="it">
<head>
<!-- KC-BUILD: evento v1.2 · 2026-06-12 02:55 · + blocco Livello (tema uscita, corso richiesto, gradi min–max). CUMULA v1.1 · 2026-06-12 02:30 · + blocco Ritrovo: punto incontro cliccabile (punto_incontro_url o link Maps costruito dal testo → navigatore), orari partenza/rientro. CUMULA v1.0: Pagina evento generica a due vite: futuro=invito (descrizione, CTA WhatsApp+worker, liste cordata/interessati), passato=memoria (galleria foto, minivideo Stream, scudetto). Fonte: RPC get_evento_pubblico(slug). Iscrizione: kc-eventi (richiede v3 con evento_slug+stato) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evento — Accademia ArrampiKata RCC | KataClimb</title>
<meta name="description" content="Uscite, viaggi ed eventi dell'Accademia ArrampiKata RCC: chi viene, chi è interessato, e la memoria di quello che abbiamo vissuto.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
:root{
  --amber:#FFBB58; --amber-deep:#F39A1F;
  --ink:#16130d; --ink2:#231e15; --paper:#f6f1e7; --paper2:#efe7d6;
  --teal:#1f8a8f; --teal-deep:#0f5e62;
  --oliva:#6e8f3d; --terra:#b4552d;
  --oro:#c9a13b; --oro-soft:#f3e7c8;
  --line:rgba(22,19,13,.12);
  --maxw:880px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);overflow-x:clip;
  font-family:"Archivo",system-ui,sans-serif;font-size:14.4px;line-height:1.6}
h1,h2,h3{font-family:"Archivo Black",sans-serif;font-weight:900;line-height:1.05;margin:0}
a{color:inherit}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 18px}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;max-width:var(--maxw);margin:0 auto}
.brand{display:flex;align-items:center;gap:10px;font-family:"Archivo Black";font-size:16px;text-decoration:none}
.brand small{font-family:"Archivo";font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:9.5px;opacity:.6;display:block}
.back{font-size:12px;font-weight:700;text-decoration:none;opacity:.7}

.hero{position:relative;border-radius:24px;overflow:hidden;margin:6px auto 20px;max-width:var(--maxw);min-height:260px;display:flex;align-items:flex-end}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(22,19,13,.1) 25%,rgba(22,19,13,.85) 100%)}
.hero .inner{position:relative;padding:clamp(20px,4vw,38px);color:#fff;width:100%}
.hero .tipo{font-family:"Archivo Black";font-size:10.5px;text-transform:uppercase;letter-spacing:.14em}
.hero h1{font-size:clamp(24px,4.4vw,40px);text-transform:uppercase;margin:6px 0 4px}
.hero .meta{opacity:.88;font-size:13px}
.mem-pill{display:inline-block;background:var(--oro);color:var(--ink);font-family:"Archivo Black";font-size:10px;
  text-transform:uppercase;letter-spacing:.08em;padding:5px 12px;border-radius:999px;margin-bottom:8px}

.grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start;margin-bottom:36px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.panel{background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:20px}
.panel h2{font-size:14px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.desc{white-space:pre-line}
.req{margin-top:14px;background:var(--paper2);border-radius:12px;padding:12px 14px;font-size:12.5px}
.req b{font-family:"Archivo Black";font-size:10px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}

.btn{display:block;text-align:center;text-decoration:none;font-family:"Archivo Black";font-size:12.5px;text-transform:uppercase;
  letter-spacing:.03em;padding:14px 18px;border-radius:999px;cursor:pointer;border:0;width:100%;margin-top:10px}
.btn-amber{background:var(--amber);color:var(--ink);box-shadow:0 10px 30px rgba(243,154,31,.35)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.btn[disabled]{opacity:.5;cursor:default}
.note-int{font-size:11px;opacity:.6;text-align:center;margin-top:6px}

.people h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin:14px 0 7px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--paper2);border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-size:11.5px;font-weight:700}
.chip.int{opacity:.7;background:transparent}
.nessuno{font-size:12px;opacity:.5}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:10px}
.gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;border:1.5px solid var(--oro-soft)}
.gallery figcaption{font-size:10.5px;opacity:.6;margin-top:3px}
.minivideo{margin-top:14px;border-radius:16px;overflow:hidden;border:2px solid var(--oro)}
.minivideo iframe{display:block;width:100%;aspect-ratio:16/9;border:0}
.scudetto{margin-top:16px;background:linear-gradient(165deg,#fffdf6,var(--oro-soft));border:1.5px solid var(--oro);
  border-radius:16px;padding:16px 18px;font-size:13px}
.scudetto b{font-family:"Archivo Black"}
.empty-mem{font-size:12.5px;opacity:.6;padding:8px 0}

footer{border-top:1.5px solid var(--line);padding:26px 18px 40px;text-align:center;font-size:11.5px;opacity:.65;margin-top:30px}
</style>
</head>
<body>

<header>
  <a class="brand" href="/">KATACLIMB<small>Accademia ArrampiKata RCC · Roma</small></a>
  <a class="back" href="/eventi.html">← Tutti gli eventi</a>
</header>

<div id="app" class="wrap"><div style="padding:60px 0;text-align:center;opacity:.5">Carico l'evento…</div></div>

<footer>Accademia ArrampiKata RCC · Via Cassia 1634, Roma · <a href="/eventi.html">Calendario eventi</a></footer>

<script>
/* ═══ CONFIG ═══ */
const CFG={
  SB_URL:'https://wbtougychlhnlcnonqge.supabase.co',
  SB_KEY:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidG91Z3ljaGxobmxjbm9ucWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTQ0MTUsImV4cCI6MjA5MDk5MDQxNX0.QwYWbaOkquJCwOHV6e9w38bLGEO-iNzuH7mwBVgTa9E',
  WORKER_EVENTI:'https://kc-eventi.marconescatelli.workers.dev', /* iscrizione/interesse: richiede kc-eventi v3 (evento_slug + stato) */
  WHATSAPP:'393318743953',
};
/* Eventi con landing dedicata: l'iscrizione passa da lì (la landing converte, non la doppiamo) */
const LANDINGS={'kcamp-73':'/73_KataCamp.html'};
const TIPO={
  viaggio:{label:'✈ Viaggio',color:'#F39A1F'},
  uscita_adulti:{label:'⛰ Uscita adulti',color:'#1f8a8f'},
  uscita_ragazzi:{label:'🧗 Uscita ragazzi',color:'#6e8f3d'},
  evento:{label:'◆ Evento',color:'#b4552d'},
};
const MESI_S=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
function dLoc(s){const[a,b,c]=s.split('-');return new Date(+a,+b-1,+c);}
function today0(){const t=new Date();return new Date(t.getFullYear(),t.getMonth(),t.getDate());}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtRange(e){
  const a=dLoc(e.data_inizio),b=dLoc(e.data_fine||e.data_inizio);
  if(a.getTime()===b.getTime())return a.getDate()+' '+MESI_S[a.getMonth()]+' '+a.getFullYear();
  if(a.getMonth()===b.getMonth())return a.getDate()+'–'+b.getDate()+' '+MESI_S[a.getMonth()]+' '+a.getFullYear();
  return a.getDate()+' '+MESI_S[a.getMonth()]+' – '+b.getDate()+' '+MESI_S[b.getMonth()]+' '+a.getFullYear();
}

let DATA=null,SLUG=new URLSearchParams(location.search).get('slug')||'';

async function load(){
  if(!SLUG){render404();return;}
  const r=await fetch(CFG.SB_URL+'/rest/v1/rpc/get_evento_pubblico',{
    method:'POST',headers:{'Content-Type':'application/json','apikey':CFG.SB_KEY,'Authorization':'Bearer '+CFG.SB_KEY},
    body:JSON.stringify({p_slug:SLUG})
  });
  const j=r.ok?await r.json():null;
  if(!j||!j.evento){render404();return;}
  DATA=j;render();
}
function render404(){
  document.getElementById('app').innerHTML='<div style="padding:60px 0;text-align:center">'+
    '<h1 style="font-size:24px;text-transform:uppercase">Evento non trovato</h1>'+
    '<p style="opacity:.6">Forse il link è cambiato. <a href="/eventi.html">Guarda il calendario →</a></p></div>';
}

function render(){
  const e=DATA.evento,t=TIPO[e.tipo]||TIPO.evento;
  const past=dLoc(e.data_fine||e.data_inizio)<today0();
  document.title=e.nome+' — Accademia ArrampiKata RCC | KataClimb';
  const iscritti=DATA.iscritti||[],inter=DATA.interessati||[],media=DATA.media||[];
  const foto=media.filter(m=>m.tipo==='foto'),video=media.filter(m=>m.tipo==='video');

  const hero='<section class="hero" style="background:linear-gradient(160deg,'+t.color+',#16130d 75%)">'+
    (e.copertina_url?'<img src="'+esc(e.copertina_url)+'" alt="">':'')+'<div class="veil"></div>'+
    '<div class="inner">'+(past?'<span class="mem-pill">📸 Memoria</span><br>':'')+
    '<span class="tipo" style="color:'+t.color.replace('#16130d','#fff')+'">'+t.label+'</span>'+
    '<h1>'+esc(e.nome)+'</h1>'+
    '<div class="meta">'+fmtRange(e)+(e.luogo?' · '+esc(e.luogo):'')+'</div></div></section>';

  let main='';
  if(!past){
    /* ── VITA 1: INVITO ── */
    const landing=LANDINGS[e.slug];
    const mapsUrl=e.punto_incontro_url||(e.punto_incontro?'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(e.punto_incontro+(e.luogo?' '+e.luogo:'')):'');
    const ritrovo=(e.punto_incontro||e.ora_partenza)?
      '<div class="req" style="margin-top:10px"><b>Ritrovo</b>'+
      (e.punto_incontro?(mapsUrl?'<a href="'+esc(mapsUrl)+'" target="_blank" rel="noopener" style="font-weight:700">📍 '+esc(e.punto_incontro)+' → apri il navigatore</a>':esc(e.punto_incontro)):'')+
      (e.ora_partenza?'<div style="margin-top:3px">🕗 Partenza <b>'+esc(e.ora_partenza.slice(0,5))+'</b>'+(e.ora_rientro?' · rientro previsto <b>'+esc(e.ora_rientro.slice(0,5))+'</b>':'')+'</div>':'')+
      '</div>':'';
    main='<div class="grid">'+
      '<div class="panel"><h2>L\'evento</h2>'+
        '<div class="desc">'+(e.descrizione?esc(e.descrizione):'I dettagli arrivano presto. Intanto segna la data.')+'</div>'+
        ritrovo+
        (e.requisito?'<div class="req"><b>Per chi è</b>'+esc(e.requisito)+'</div>':'')+
        livelloHTML(e)+
        ritrovoHTML(e)+
        '<button class="btn btn-ghost" onclick="addICS()">📅 Aggiungi al calendario</button>'+
      '</div>'+
      '<div class="panel">'+
        '<h2>Vieni con noi</h2>'+
        (landing
          ?'<a class="btn btn-amber" href="'+landing+'">Scopri e iscriviti →</a>'
          :'<a class="btn btn-amber" href="'+waLink(e)+'">Voglio esserci → WhatsApp</a>')+
        '<button class="btn btn-ghost" id="btnInt" onclick="interessa()">✋ Mi interessa</button>'+
        '<div class="note-int">Nessun impegno: dici solo "tienimi d\'occhio".</div>'+
        '<div class="people">'+
          '<h3>La cordata · '+iscritti.length+'</h3>'+
          (iscritti.length?'<div class="chips">'+iscritti.map(p=>'<span class="chip">'+esc(p.etichetta)+'</span>').join('')+'</div>'
            :'<div class="nessuno">Sii la prima firma.</div>')+
          '<h3>Interessati · '+inter.length+'</h3>'+
          (inter.length?'<div class="chips">'+inter.map(p=>'<span class="chip int">'+esc(p.etichetta)+'</span>').join('')+'</div>'
            :'<div class="nessuno">Ancora nessuno — rompi il ghiaccio.</div>')+
        '</div>'+
      '</div></div>';
  }else{
    /* ── VITA 2: MEMORIA ── */
    main='<div class="panel" style="margin-bottom:18px"><h2>Com\'è andata</h2>'+
      '<div class="desc">'+(e.descrizione?esc(e.descrizione):'')+'</div>'+
      (video.length?'<div class="minivideo"><iframe src="https://iframe.videodelivery.net/'+esc(video[0].stream_uid)+'" allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture" allowfullscreen loading="lazy"></iframe></div>':'')+
      (foto.length?'<div class="gallery">'+foto.map(f=>'<figure style="margin:0"><img src="'+esc(f.url)+'" alt="'+esc(f.didascalia||e.nome)+'" loading="lazy">'+(f.didascalia?'<figcaption>'+esc(f.didascalia)+'</figcaption>':'')+'</figure>').join('')+'</div>':'')+
      (!video.length&&!foto.length?'<div class="empty-mem">Le foto e il minivideo di questa esperienza arrivano presto.</div>':'')+
      '</div>'+
      '<div class="panel"><h2>Chi c\'era · '+iscritti.length+'</h2>'+
      (iscritti.length?'<div class="chips">'+iscritti.map(p=>'<span class="chip">'+esc(p.etichetta)+'</span>').join('')+'</div>':'<div class="nessuno">—</div>')+
      '<div class="scudetto">🛡 <b>C\'eri anche tu?</b> Questa esperienza è uno scudetto sul tuo profilo: la prova di quello che hai vissuto. <a href="/portale.html">Aprilo nel portale →</a></div>'+
      '</div>';
  }
  document.getElementById('app').innerHTML=hero+main;
}


function livelloHTML(e){
  if(!e.tema&&!e.corso_richiesto&&!e.grado_min)return '';
  const TEMA={prima:'Prima uscita',intermedia:'Uscita intermedia',da_primi:'Uscita da primi',voli:'Uscita voli',lavorato:'Uscita lavorato'};
  const CORSO={open:'Open',advance:'Advance',evo_corda:'Evo'};
  const parts=[];
  if(e.tema)parts.push('<b style="display:inline">'+(TEMA[e.tema]||e.tema)+'</b>');
  if(e.corso_richiesto)parts.push('richiede corso <b style="display:inline">'+(CORSO[e.corso_richiesto]||e.corso_richiesto)+'</b>');
  if(e.grado_min||e.grado_max)parts.push('gradi '+(e.grado_min||'?')+(e.grado_max&&e.grado_max!==e.grado_min?'–'+e.grado_max:''));
  return '<div class="req" style="margin-top:10px"><b>Livello</b>'+parts.join(' · ')+'</div>';
}
function ritrovoHTML(e){
  if(!e.punto_incontro&&!e.ora_partenza)return '';
  const url=e.punto_incontro_url||(e.punto_incontro?'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(e.punto_incontro):null);
  let h='<div class="req" style="margin-top:10px"><b>Ritrovo</b>';
  if(e.punto_incontro)h+=esc(e.punto_incontro);
  if(url)h+=' · <a href="'+esc(url)+'" target="_blank" rel="noopener" style="font-weight:700">📍 Apri il navigatore</a>';
  if(e.ora_partenza)h+='<br>🕗 Partenza '+e.ora_partenza.slice(0,5)+(e.ora_rientro?' · rientro previsto '+e.ora_rientro.slice(0,5):'');
  h+='</div>';return h;
}
function waLink(e){
  const t='Ciao Marco! Voglio esserci: '+e.nome+' ('+fmtRange(e)+').%0ANome: %0ATelefono: ';
  return 'https://wa.me/'+CFG.WHATSAPP+'?text='+t;
}

/* "Mi interessa": scrive interessato via kc-eventi (richiede worker v3: evento_slug + stato) */
async function interessa(){
  const nome=prompt('Il tuo nome e cognome:');if(!nome||!nome.trim())return;
  const contatto=prompt('Telefono o email (per avvisarti):')||'';
  const b=document.getElementById('btnInt');b.disabled=true;b.textContent='✋ Segnato!';
  try{
    fetch(CFG.WORKER_EVENTI,{method:'POST',headers:{'Content-Type':'text/plain'},keepalive:true,
      body:JSON.stringify({evento_slug:SLUG,stato:'interessato',nome:nome.trim(),
        telefono:/@/.test(contatto)?'':contatto.trim(),email:/@/.test(contatto)?contatto.trim():'',
        evento:DATA.evento.nome})});
  }catch(_){}
}

function addICS(){
  const e=DATA.evento,a=e.data_inizio.replace(/-/g,''),
    fine=dLoc(e.data_fine||e.data_inizio);fine.setDate(fine.getDate()+1);
  const b=fine.getFullYear()+String(fine.getMonth()+1).padStart(2,'0')+String(fine.getDate()).padStart(2,'0');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//KataClimb//Eventi//IT','BEGIN:VEVENT',
    'UID:'+e.slug+'@kataclimb.com','SUMMARY:'+e.nome,
    'DTSTART;VALUE=DATE:'+a,'DTEND;VALUE=DATE:'+b,
    'LOCATION:'+(e.luogo||''),'DESCRIPTION:'+(e.requisito||''),'END:VEVENT','END:VCALENDAR'].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar'}),el=document.createElement('a');
  el.href=URL.createObjectURL(blob);el.download=e.slug+'.ics';el.click();
}

load();
</script>
</body>
</html>

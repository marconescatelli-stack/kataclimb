<style>
:root{
  --nero:#000; --tile:#161618; --bianco:#FFF; --grigio:#9A9AA0; --velo:rgba(255,255,255,.08);
  --rosso:#FF3B30; --rosso2:#C81E1E;
  --corpo:#FF5A1F; --gravita:#0A84FF; --cordata:#30D158; --vuoto:#BF5AF2; --fiducia:#FFD60A;
  --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--nero); color:var(--bianco);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.4;
  max-width:480px; margin:0 auto; padding:10px 0 88px;
}
.mono{font-family:'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase}
a{color:inherit; text-decoration:none}

#gate{display:none; padding:80px 24px; text-align:center}
#gate h1{font-family:'Cormorant Garamond',serif; font-weight:500; font-size:1.8rem; margin-bottom:10px}
#gate p{color:var(--grigio); font-size:.92rem; margin-bottom:24px}
#gate a{display:inline-block; padding:14px 28px; border-radius:12px; background:var(--fiducia); color:#000; font-weight:800; font-family:'JetBrains Mono',monospace; letter-spacing:.05em; font-size:.9rem}

#app{display:none}
.console{display:grid; grid-template-columns:repeat(3,1fr); gap:7px; padding:0 12px}
.full{grid-column:1/-1}
.due{grid-column:span 2}
.zona{grid-column:1/-1; padding:4px 2px 0; color:var(--grigio); font-weight:800; font-size:.56rem; display:flex; align-items:center; gap:8px}
.zona::after{content:''; flex:1; height:1px; background:var(--velo)}

.t{
  border-radius:var(--r); padding:10px; min-height:88px; display:flex; flex-direction:column;
  background:var(--tile); border:1px solid var(--velo); position:relative; overflow:hidden;
  transition:transform .1s;
}
.t:active{transform:scale(.96)}
.t .et{font-weight:800; font-size:.52rem; margin-bottom:auto; opacity:.95}
.t .big{font-family:'JetBrains Mono',monospace; font-weight:800; font-size:1.3rem; line-height:1.05}
.t .big small{font-size:.75rem; opacity:.7}
.t .cmd{font-family:'JetBrains Mono',monospace; font-weight:800; font-size:.56rem; letter-spacing:.08em; margin-top:3px}

/* CHI SEI */
.chi{grid-column:1/-1; padding:6px 2px 2px; display:flex; align-items:center; gap:12px}
.chi .iniz{
  width:54px; height:54px; border-radius:16px; flex:none;

}
.chi .nome{font-family:'JetBrains Mono',monospace; font-weight:800; font-size:1.05rem; letter-spacing:.05em}
.chi .da{color:var(--grigio); font-size:.68rem; margin-top:2px}
.chi .grado{
  margin-left:auto; flex:none; font-family:'JetBrains Mono',monospace; font-weight:800;
  font-size:.56rem; letter-spacing:.1em; text-transform:uppercase;
  padding:6px 10px; border-radius:999px; border:1.5px solid var(--cordata); color:var(--cordata);
}

/* DOVE SEI ORA */
.t-corso{background:linear-gradient(140deg,#1C1C1F,#0C0C0E); border-color:rgba(255,214,10,.4)}
.t-corso .et{color:var(--grigio)}

.t-asd .et{color:var(--grigio)}

.t-asd.scaduta .big{color:var(--rosso)}
.t-asd.scaduta .cmd{color:var(--rosso)}

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ── SENTIERO INTERO: 33 nodi, oro=certificato pieno=vissuto ── */
async function loadSentiero(){
  try{
    const{data:v,error}=await sb.from('kata_videos').select('*').eq('user_id',uid);
    if(error)throw error;
    const vids=(v||[]).filter(x=>x.status!=='error');
    const perKata={};
    vids.forEach(x=>{ (perKata[x.kata_num]=perKata[x.kata_num]||[]).push(x); });
    const vissuti=Object.keys(perKata).map(Number);
    /* kata_certs: array, oppure oggetto jsonb {num:..} (portale), fallback video certified */
    let certNums=[];
    if(Array.isArray(profilo.kata_certs)) certNums=profilo.kata_certs.map(Number);
    else if(profilo.kata_certs && typeof profilo.kata_certs==='object') certNums=Object.keys(profilo.kata_certs).map(Number);
    if(!certNums.length) certNums=vids.filter(x=>x.status==='certified').map(x=>Number(x.kata_num));
    const certs=new Set(certNums.filter(n=>!isNaN(n)&&n>=1&&n<=33));

    document.getElementById('sent-num').innerHTML=vissuti.length+'<small>/33</small>';
    let next=null;
    for(let k=1;k<=33;k++){ if(!perKata[k]){next=k;break;} }

    const box=document.getElementById('sent-fasce');
    box.innerHTML=FASCE.map(f=>{
      let nodi='';
      for(let k=f.da;k<=f.a;k++){
        const cls=certs.has(k)?' oro':(perKata[k]?' vissuto':(k===next?' next':''));
        nodi+=`<span class="fn${cls}" title="${esc(KN[k]||'')}">${k}</span>`;
      }
      return `<div class="fascia" style="--fc:${f.c}">
        <div class="fnome">${f.nome} · ${f.da===f.a?f.da:f.da+'–'+f.a}</div>
        <div class="fnodi">${nodi}</div>
      </div>`;
    }).join('');

    document.getElementById('kata-next').textContent=next?('KATA '+String(next).padStart(2,'0')):'COMPLETO';
    const ptxt=document.getElementById('parola-txt'), pk=document.getElementById('parola-k');
    const kRef=next||33;
    if(PAROLE[kRef]){ ptxt.textContent=PAROLE[kRef]; }
    else{ ptxt.textContent=KN[kRef]||''; }
    pk.textContent='KATA '+String(kRef).padStart(2,'0')+' ›';

    const conData=vids.filter(x=>x.uploaded_at).sort((a,b)=>new Date(a.uploaded_at)-new Date(b.uploaded_at));
    if(conData.length){
      const primo=conData[0], ultimo=conData[conData.length-1];
      const cell=(x,oro)=>`<div class="v${oro?' oro':''}" ${x.thumbnail_url?`style="background-image:url('${esc(x.thumbnail_url)}')`+`"`:''}>${x.thumbnail_url?'':'▶'}</div>`;
      document.getElementById('mem-vv').innerHTML=cell(primo,false)+cell(ultimo,true);
    }
  }catch(e){ console.error('[sentiero]',e); }
}

/* ── PERCORSO CORSI: fonte iscrizioni_corso (P-FONTE-CORSO), cache corso_attivo per il "qui" ── */
async function loadPercorso(){
  try{
    let righe=[];
    try{
      const{data,error}=await sb.from('iscrizioni_corso').select('tipo_corso,status').eq('user_id',uid);
      if(error)throw error;
      righe=data||[];
    }catch(e){ console.warn('[percorso] iscrizioni non leggibili:',e.message); }

    const ORD=['prima_lezione','open','advance','intro_corda','evo_corda'];
    const qui=pdata.corso_attivo||null;
    const fatte=new Set();
    if(pdata.prima_done)fatte.add('prima_lezione');
    righe.forEach(r=>{
      const st=String(r.status||'');
      if(st && st!=='attiva')fatte.add(r.tipo_corso); /* completata / completata_pregressa / conclusa… */
    });

    document.getElementById('tappe').innerHTML=ORD.map(t=>{
      const cls=t===qui?' qui':(fatte.has(t)?' fatta':'');
      return `<div class="tappa${cls}">${TIPO_LBL[t]}</div>`;
    }).join('');
    document.getElementById('perc-cmd').textContent=qui?('SEI QUI: '+(TIPO_LBL[qui]||qui).toUpperCase()):'IL PERCORSO TI ASPETTA';
  }catch(e){ console.error('[percorso]',e); }
}

/* ── ISCRIZIONE ASD Accademia RCC: struttura verificata 13 giu
      (tesseramenti: persona_id uuid, anno int, data_inizio/data_scadenza date, stato text) ── */
async function loadAsd(){
  const tile=document.getElementById('t-asd');
  try{
    if(!pdata.persona_id)return; /* senza persona_id niente asse ASD */
    const{data:rows,error}=await sb.from('tesseramenti')
      .select('anno, data_scadenza, stato')
      .eq('persona_id',pdata.persona_id)
      .order('anno',{ascending:false});
    if(error)throw error;
    if(!rows||!rows.length)return; /* mai tesserato: tessera assente, lo dira la segreteria */
    const annoOra=new Date().getFullYear();
    const corrente=rows.find(r=>r.anno===annoOra);
    if(corrente){
      const sc=corrente.data_scadenza?dLoc(corrente.data_scadenza):null;
      document.getElementById('asd-big').textContent=annoOra+' \u2713';
      document.getElementById('asd-cmd').textContent=sc?('FINO AL '+sc.getDate()+' '+MESI[sc.getMonth()].slice(0,3).toUpperCase()):"VALE TUTTO L'ANNO";
    }else{
      document.getElementById('asd-big').textContent='RINNOVA';
      document.getElementById('asd-cmd').textContent='ULTIMO ANNO: '+rows[0].anno+' \u203a';
      tile.classList.add('scaduta');
    }
    tile.style.display='';
  }catch(e){ console.warn('[asd] nascosta:',e.message); }
}

/* ── SCUDETTI: struttura verificata 13 giu (scudetti_persona: persona_id, evento_nome,
      evento_slug, data_inizio, conquistato_at) — uno scudo per evento conquistato ── */
async function loadScudetti(){
  const tile=document.getElementById('t-scudi');
  try{
    if(!pdata.persona_id)return;
    const{data:rows,error}=await sb.from('scudetti_persona')
      .select('evento_nome, evento_slug, data_inizio, conquistato_at')
      .eq('persona_id',pdata.persona_id)
      .order('conquistato_at',{ascending:true});
    if(error)throw error;
    const n=(rows||[]).length;
    const slot=Math.max(5,n);
    let html='';
    for(let i=0;i<slot;i++){
      const r=rows&&rows[i];
      html+=`<div class="scudo ${r?'preso':'vuoto'}" title="${r?esc(r.evento_nome||''):''}">${r?'\u{1F6E1}':'\u00b7'}</div>`;
    }
    document.getElementById('scudi-box').innerHTML=html;
    document.getElementById('scudi-cmd').textContent=n===0?'IL PRIMO TI ASPETTA \u203a':(n===1?'1 CONQUISTATO \u203a':n+' CONQUISTATI \u203a');
    tile.style.display='';
  }catch(e){ console.warn('[scudetti] nascosta:',e.message); }
}

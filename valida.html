<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<!-- KC-BUILD: valida v1.0 · 2026-06-13 notte · SALA DI REVISIONE KATA (solo creator, decisione Marco 13 giu).
     Lista video in attesa (kata_videos slot=2 status='ready') con nome allievo, Kata, player Stream
     (pattern CF_STREAM_BASE+uid+'/iframe' copiato dal portale live), CERTIFICA -> rpc certifica_kata v3
     (guardia solo-creator in DB) · DA RIFARE -> rpc rifiuta_kata (status 'rejected' dal vocabolario CHECK
     esistente + feedback_validazione/feedback_at, colonne aggiunte 13 giu). Guardia anche lato pagina:
     profiles.role==='creator', gli altri vedono il cancello. Pagina separata, pattern oggi/agenda.
     PROSSIMI PEZZI COLLEGATI (non qui): lato allievo "Leggi le correzioni" + Ricarica Kata nel portale;
     worker stream-bridge: slot 'rejected' riusabile per il re-upload. -->
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valida · KataClimb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --nero:#000; --tile:#161618; --bianco:#FFF; --grigio:#9A9AA0; --velo:rgba(255,255,255,.08);
  --rosso:#FF3B30; --cordata:#30D158; --vuoto:#BF5AF2; --fiducia:#FFD60A;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--nero); color:var(--bianco);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  max-width:560px; margin:0 auto; padding:14px 12px 96px;
}
.mono{font-family:'JetBrains Mono',monospace; letter-spacing:.12em; text-transform:uppercase}
a{color:inherit; text-decoration:none}

#gate{display:none; padding:80px 24px; text-align:center}
#gate h1{font-family:'Cormorant Garamond',serif; font-weight:500; font-size:1.8rem; margin-bottom:10px}
#gate p{color:var(--grigio); font-size:.92rem; margin-bottom:24px}
#gate a{display:inline-block; padding:14px 28px; border-radius:12px; background:var(--fiducia); color:#000; font-weight:800; font-family:'JetBrains Mono',monospace; font-size:.9rem}

.testa{font-family:'JetBrains Mono',monospace; font-weight:800; font-size:.95rem; letter-spacing:.05em; margin-bottom:4px}
.testa b{color:var(--vuoto)}
.sotto{color:var(--grigio); font-size:.78rem; margin-bottom:14px}

.card{
  background:var(--tile); border:1px solid var(--velo); border-radius:18px;
  padding:12px; margin-bottom:14px; overflow:hidden;
}
.card .chi{display:flex; align-items:baseline; gap:8px; margin-bottom:4px; flex-wrap:wrap}
.card .chi .nome{font-family:'JetBrains Mono',monospace; font-weight:800; font-size:.92rem}
.card .chi .kata{font-family:'JetBrains Mono',monospace; font-weight:800; font-size:.66rem; color:var(--vuoto); letter-spacing:.1em}
.card .chi .quando{margin-left:auto; color:var(--grigio); font-size:.66rem}
.card .knome{font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--grigio); font-size:.9rem; margin-bottom:10px}
.player{position:relative; width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden; background:#0B0B0D; margin-bottom:10px}
.player iframe{position:absolute; inset:0; width:100%; height:100%; border:0}
.azioni{display:flex; gap:8px}
.azioni button{
  flex:1; padding:13px 0; border:none; border-radius:12px; cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-weight:800; font-size:.74rem; letter-spacing:.1em;
}
.b-ok{background:var(--fiducia); color:#000}
.b-no{background:#2A1214; color:#FF8A84; border:1px solid rgba(255,59,48,.4)!important}
.b-ok:active,.b-no:active{transform:scale(.97)}
.fb{display:none; margin-top:10px}
.fb textarea{
  width:100%; min-height:90px; border-radius:12px; border:1px solid var(--velo);
  background:#0E0E10; color:#fff; padding:10px; font-size:.92rem; font-family:inherit; resize:vertical;
}
.fb .invia{margin-top:8px; width:100%; padding:13px 0; border:none; border-radius:12px; cursor:pointer;
  background:var(--rosso); color:#fff; font-family:'JetBrains Mono',monospace; font-weight:800; font-size:.74rem; letter-spacing:.1em}
.fb .hint{color:var(--grigio); font-size:.7rem; margin-top:6px}

.vuoto-box{
  border:1px dashed rgba(255,255,255,.2); border-radius:18px; padding:38px 16px; text-align:center; color:var(--grigio);
}
.vuoto-box b{font-family:'JetBrains Mono',monospace; letter-spacing:.1em; color:var(--cordata); display:block; margin-bottom:6px}

.toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:#222226; color:#fff;
  padding:12px 22px; border-radius:12px; font-size:.85rem; font-weight:700; opacity:0; pointer-events:none; transition:opacity .25s; z-index:50}
.toast.on{opacity:1}

.bar{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:560px; display:flex;
  background:rgba(13,13,15,.94); backdrop-filter:blur(12px); border-top:1px solid var(--velo);
  padding:7px 0 max(9px, env(safe-area-inset-bottom)); z-index:40}
.bar a{flex:1; text-align:center; color:var(--grigio); font-size:.62rem; letter-spacing:.05em}
.bar a span{display:block; font-size:1.2rem; margin-bottom:2px}
.bar a.attivo{color:var(--bianco)}
.bar a.attivo span{color:var(--fiducia)}

@media (min-width:900px){
  body{max-width:880px}
  #lista{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .card{margin-bottom:0}
  .bar{max-width:880px}
}
</style>
</head>
<body>

<div id="gate">
  <h1>Valida</h1>
  <p id="gate-msg">Per entrare nella sala di revisione devi passare dal portale.</p>
  <a href="/portale.html">ENTRA</a>
</div>

<div id="app" style="display:none">
  <div class="testa mono">▶ DA VALIDARE <b id="n-tot"></b></div>
  <div class="sotto">I video di validazione in attesa del tuo sguardo. Certifica, o rimanda con le correzioni.</div>
  <div id="lista"></div>
</div>

<div class="toast" id="toast"></div>

<nav class="bar">
  <a href="/oggi.html"><span>◉</span>Oggi</a>
  <a href="/agenda.html"><span>🗓</span>Agenda</a>
  <a href="/eventi.html"><span>✈</span>Eventi</a>
  <a href="/profilo.html"><span>👤</span>Profilo</a>
</nav>

<script>
const CFG={
  SB_URL:'https://wbtougychlhnlcnonqge.supabase.co',
  SB_KEY:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidG91Z3ljaGxobmxjbm9ucWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTQ0MTUsImV4cCI6MjA5MDk5MDQxNX0.QwYWbaOkquJCwOHV6e9w38bLGEO-iNzuH7mwBVgTa9E',
};
/* customer subdomain Cloudflare Stream — copiato dal portale live (CF_STREAM_BASE) */
const CF_STREAM_BASE='https://customer-w6v58fe3qv5tc0m4.cloudflarestream.com/';
const KN={1:'Il Pronti',2:'Atterraggio',3:'Il Gradino',4:'Lo Scorrere',5:'Il Piombo',6:"Blocco dell'Asse",7:"Angolo d'Incidenza in Parete",8:"Angolo d'Incidenza in Sospensione",9:'Fuori–Dentro–Fuori',10:'Tutto in Uno',11:'Appendersi (Fiducia)',12:'Andare su Corda',13:'Altalena',14:'Progressione Appendersi Alto',15:'Pendoli',16:'Processo di Moschettonaggio',17:'Appendersi da Primo',18:'Pendolo in Calata',19:'Setup Sicura',20:'Postura di Sicura',21:'Dare / Recuperare Corda',22:'Blocca / Sblocca',23:'Dare e Recuperare Veloce',24:'Calata',25:'Test Progressivo in Parete',26:'Accompagnare il Compagno',27:'Lettura e Individuazione Via',28:'Determinazione Punto di Volo',29:'Progressività del Volo',30:'Mini-Caduta Tecnica',31:'Postura di Sicura Dinamica',32:'Ammortizzamento del Volo',33:'Buddy Check'};

let sb,uid,righe=[];

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}
function gate(msg){
  if(msg)document.getElementById('gate-msg').textContent=msg;
  document.getElementById('gate').style.display='block';
}

async function init(){
  sb=window.supabase.createClient(CFG.SB_URL,CFG.SB_KEY);
  const{data:{session}}=await sb.auth.getSession();
  if(!session){gate();return;}
  uid=session.user.id;

  const{data:me}=await sb.from('profiles').select('role').eq('user_id',uid).maybeSingle();
  if(!me || me.role!=='creator'){
    gate('La validazione dei Kata è riservata al creatore del metodo.');
    return;
  }
  document.getElementById('app').style.display='block';
  await carica();
}

async function carica(){
  try{
    const{data:v,error}=await sb.from('kata_videos')
      .select('id, user_id, kata_num, stream_uid, uploaded_at')
      .eq('slot',2).eq('status','ready')
      .order('uploaded_at',{ascending:true});
    if(error)throw error;
    righe=v||[];

    /* nomi allievi in un colpo solo */
    const ids=[...new Set(righe.map(r=>r.user_id))];
    const nomi={};
    if(ids.length){
      const{data:profs}=await sb.from('profiles').select('user_id, nome, cognome').in('user_id',ids);
      (profs||[]).forEach(p=>{nomi[p.user_id]=((p.nome||'')+' '+(p.cognome||'')).trim()||'—';});
    }
    render(nomi);
  }catch(e){
    console.error('[valida]',e);
    document.getElementById('lista').innerHTML='<div class="vuoto-box">Non riesco a leggere i video ora. Riprova.</div>';
  }
}

function render(nomi){
  document.getElementById('n-tot').textContent=righe.length||'';
  const box=document.getElementById('lista');
  if(!righe.length){
    box.innerHTML=`<div class="vuoto-box"><b>RESPIRA.</b>Nessun video in attesa. Tutto validato.</div>`;
    return;
  }
  box.innerHTML=righe.map(r=>{
    const quando=r.uploaded_at?new Date(r.uploaded_at).toLocaleDateString('it-IT',{day:'numeric',month:'short'}):'';
    return `<div class="card" id="card-${r.id}">
      <div class="chi">
        <span class="nome">${esc(nomi[r.user_id]||'—')}</span>
        <span class="kata mono">KATA ${String(r.kata_num).padStart(2,'0')}</span>
        <span class="quando">${esc(quando)}</span>
      </div>
      <div class="knome">${esc(KN[r.kata_num]||'')}</div>
      <div class="player">${r.stream_uid?`<iframe src="${esc(CF_STREAM_BASE+r.stream_uid+'/iframe')}" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen loading="lazy"></iframe>`:'<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--grigio)">Video non disponibile</div>'}</div>
      <div class="azioni">
        <button class="b-ok" onclick="certifica('${r.id}')">✓ CERTIFICA</button>
        <button class="b-no" onclick="apriFb('${r.id}')">✕ DA RIFARE</button>
      </div>
      <div class="fb" id="fb-${r.id}">
        <textarea id="txt-${r.id}" placeholder="Scrivi le correzioni per l'allievo: cosa rivedere, cosa ripetere, dove guardare."></textarea>
        <button class="invia" onclick="rifiuta('${r.id}')">INVIA LE CORREZIONI E RIMANDA ›</button>
        <div class="hint">L'allievo leggerà queste parole accanto al suo Kata, con l'invito a ricaricarlo.</div>
      </div>
    </div>`;
  }).join('');
}

function riga(id){return righe.find(r=>r.id===id);}

async function certifica(id){
  const r=riga(id); if(!r)return;
  if(!confirm('Certificare il Kata '+String(r.kata_num).padStart(2,'0')+'? La certificazione è permanente.'))return;
  try{
    const{data,error}=await sb.rpc('certifica_kata',{p_user_id:r.user_id,p_kata_num:r.kata_num});
    if(error)throw error;
    document.getElementById('card-'+id)?.remove();
    righe=righe.filter(x=>x.id!==id);
    document.getElementById('n-tot').textContent=righe.length||'';
    if(!righe.length)render({});
    toast('✓ Kata '+String(r.kata_num).padStart(2,'0')+' certificato.');
  }catch(e){ toast('Errore: '+(e.message||e)); console.error('[certifica]',e); }
}

function apriFb(id){
  const f=document.getElementById('fb-'+id);
  if(f){f.style.display=f.style.display==='block'?'none':'block';}
  if(f&&f.style.display==='block')document.getElementById('txt-'+id)?.focus();
}

async function rifiuta(id){
  const r=riga(id); if(!r)return;
  const txt=(document.getElementById('txt-'+id)?.value||'').trim();
  if(txt.length<3){toast('Scrivi le correzioni prima di rimandare.');return;}
  try{
    const{data,error}=await sb.rpc('rifiuta_kata',{p_user_id:r.user_id,p_kata_num:r.kata_num,p_feedback:txt});
    if(error)throw error;
    document.getElementById('card-'+id)?.remove();
    righe=righe.filter(x=>x.id!==id);
    document.getElementById('n-tot').textContent=righe.length||'';
    if(!righe.length)render({});
    toast('✕ Kata rimandato con le correzioni.');
  }catch(e){ toast('Errore: '+(e.message||e)); console.error('[rifiuta]',e); }
}

init();
</script>
</body>
</html>

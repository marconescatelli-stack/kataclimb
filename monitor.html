<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F5F1EB">
<title>KataClimb · Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#F5F1EB; --card:#FFFFFF; --border:rgba(0,0,0,.08);
  --text:#2C2418; --text2:#5C5145; --text3:#9A8E7E;
  --open:#5B8C5A; --accent:#3A7D44; --warn:#EA580C; --err:#c0392b; --info:#2E86AB;
  --r:14px; --rs:10px;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --serif:'Cormorant Garamond',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.hidden{display:none!important}

/* HEADER */
.hdr{background:#FFFFFF;border-bottom:1px solid var(--border);padding:14px 18px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
.hdr .logo{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--open)}
.hdr .me{font-size:12px;color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr a.logout{font-size:12px;color:var(--text3);text-decoration:none;cursor:pointer;margin-left:10px}

/* SCREENS */
.screen{padding:24px 18px;max-width:560px;margin:0 auto}

/* LOGIN */
.login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px 18px}
.login-box{background:var(--card);border-radius:var(--r);padding:32px 24px;width:100%;max-width:420px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.login-title{font-family:var(--serif);font-size:28px;font-weight:400;margin-bottom:6px;color:var(--text)}
.login-title em{font-style:italic;color:var(--open)}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;font-size:16px;font-family:var(--font);color:var(--text);margin-bottom:12px;-webkit-appearance:none}
.input:focus{outline:none;border-color:var(--open)}
.btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--rs);padding:14px 20px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.btn-g{background:var(--open)}
.btn.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.msg-ok{background:rgba(91,140,90,.12);color:var(--open);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px}
.msg-err{background:rgba(192,57,43,.08);color:var(--err);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px}

/* SEARCH */
.search-wrap{margin-bottom:18px}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;font-size:16px;font-family:var(--font);color:var(--text);-webkit-appearance:none}
.search-input:focus{outline:none;border-color:var(--open)}
.results{display:flex;flex-direction:column;gap:8px}
.allievo-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s}
.allievo-row:hover{background:#fafaf7;border-color:rgba(0,0,0,.12)}
.allievo-row .name{font-size:15px;font-weight:600;color:var(--text)}
.allievo-row .meta{font-size:12px;color:var(--text2);margin-top:2px}
.allievo-row .arrow{color:var(--text3);font-size:18px}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}

/* DETAIL ALLIEVO */
.back-btn{background:none;border:none;color:var(--text2);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;margin-bottom:14px;padding:6px 0}
.allievo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:18px}
.allievo-card .nm{font-size:20px;font-weight:700;color:var(--text)}
.allievo-card .info{font-size:13px;color:var(--text2);margin-top:4px}

.kata-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.kata-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:14px 12px;cursor:pointer;text-align:left;transition:all .15s;position:relative}
.kata-tile:hover{border-color:var(--open);background:#fafaf7}
.kata-tile .kn{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.kata-tile .kt{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;min-height:34px}
.kata-tile .badge{display:inline-block;margin-top:8px;font-size:10px;background:rgba(91,140,90,.15);color:var(--open);padding:3px 7px;border-radius:6px;font-weight:700}
.kata-tile .badge.full{background:rgba(192,57,43,.1);color:var(--err)}
.kata-tile .redo-btn{position:absolute;top:8px;right:8px;background:rgba(46,134,171,.1);color:#2E86AB;border:1px solid rgba(46,134,171,.25);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;cursor:pointer;line-height:1}
.kata-tile .redo-btn:hover{background:rgba(46,134,171,.2)}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:16px}
@media(min-width:600px){.modal{align-items:center}}
.modal-card{background:var(--card);border-radius:var(--r);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:22px}
.modal-h{font-size:17px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.file-pick{background:var(--bg);border:2px dashed var(--border);border-radius:var(--rs);padding:24px 16px;text-align:center;cursor:pointer;font-size:14px;color:var(--text2);margin-bottom:14px}
.file-pick:hover{border-color:var(--open);color:var(--open)}
.file-name{font-size:13px;color:var(--text);background:rgba(91,140,90,.08);border-radius:6px;padding:8px 12px;margin-bottom:14px;word-break:break-all}
.modal-actions{display:flex;gap:10px;margin-top:8px}
.modal-actions .btn{flex:1}

/* PROGRESS */
.prog-wrap{margin-top:14px}
.prog-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:var(--open);transition:width .3s ease}
.prog-text{font-size:12px;color:var(--text2);text-align:center}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;max-width:90vw;text-align:center;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:var(--err)}

.loader{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}

.footer{text-align:center;font-size:11px;color:var(--text3);padding:32px 16px 20px;line-height:1.5}
</style>
</head>
<body>

<!-- ═══════════ HEADER (visibile solo dopo login) ═══════════ -->
<div id="hdr" class="hdr hidden">
  <div class="logo">KataClimb · Monitor</div>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="agenda_test_v3_1.html" target="_blank" style="font-size:12px;color:var(--text2);text-decoration:none;padding:5px 11px;border:1px solid rgba(0,0,0,.1);border-radius:6px;font-weight:600;letter-spacing:.3px">📅 Agenda Accademia RCC</a>
    <a href="portale.html" target="_blank" style="font-size:12px;color:var(--text2);text-decoration:none;padding:5px 11px;border:1px solid rgba(0,0,0,.1);border-radius:6px;font-weight:600;letter-spacing:.3px">👤 Portale</a>
    <div class="me" id="me-name">—</div>
    <a class="logout" onclick="doLogout()">esci</a>
  </div>
</div>

<!-- ═══════════ SCREEN: LOGIN ═══════════ -->
<div id="screen-login" class="login-wrap">
  <div class="login-box">
    <div class="login-title">Monitor <em>KataClimb</em></div>
    <div class="login-sub">Inserisci la tua email per ricevere un link di accesso.</div>
    <div id="login-msg"></div>
    <input id="login-email" class="input" type="email" placeholder="email" autocomplete="email" inputmode="email">
    <button class="btn btn-g" id="btn-send-link" onclick="sendMagicLink()">Mandami un link</button>
  </div>
</div>

<!-- ═══════════ SCREEN: APP (lista allievi) ═══════════ -->
<div id="screen-app" class="screen hidden">
  <div class="search-wrap">
    <input id="search-input" class="search-input" type="text" placeholder="Cerca per nome, cognome o telefono…" oninput="onSearchInput()">
  </div>
  <div id="search-results" class="results">
    <div class="empty">Inizia digitando per cercare un allievo.</div>
  </div>
</div>

<!-- ═══════════ SCREEN: ALLIEVO (griglia Kata) ═══════════ -->
<div id="screen-allievo" class="screen hidden">
  <button class="back-btn" onclick="backToSearch()">← Torna</button>
  <div id="allievo-card" class="allievo-card"></div>
  <div id="kata-grid" class="kata-grid"></div>
</div>

<!-- ═══════════ MODAL UPLOAD ═══════════ -->
<div id="modal-upload" class="modal hidden" onclick="if(event.target===this)closeUpload()">
  <div class="modal-card">
    <div class="modal-h" id="up-title">Upload</div>
    <div class="modal-sub" id="up-sub">—</div>
    <label class="file-pick" id="up-pick" for="up-file">
      📹 Scegli video<br>
      <span style="font-size:11px;color:var(--text3)">scatta col telefono, poi seleziona da libreria<br>max 12 secondi · MP4/MOV</span>
    </label>
    <input id="up-file" type="file" accept="video/*" style="display:none" onchange="onFilePicked(event)">
    <div id="up-fname" class="file-name hidden"></div>
    <div id="up-prog" class="prog-wrap hidden">
      <div class="prog-bar"><div class="prog-fill" id="up-fill" style="width:0%"></div></div>
      <div class="prog-text" id="up-text">Caricamento…</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeUpload()">Annulla</button>
      <button class="btn btn-g" id="up-submit" onclick="doUpload()" disabled>Carica</button>
    </div>
  </div>
</div>

<!-- ═══════════ TOAST ═══════════ -->
<div id="toast" class="toast"></div>

<div class="footer">
  KataClimb® · Accademia RCC · Syncrolink Ltd
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG — sostituire prima del deploy
   ═══════════════════════════════════════════════════════════ */
const CFG = {
  SUPABASE_URL: 'https://wbtougychlhnlcnonqge.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidG91Z3ljaGxobmxjbm9ucWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTQ0MTUsImV4cCI6MjA5MDk5MDQxNX0.QwYWbaOkquJCwOHV6e9w38bLGEO-iNzuH7mwBVgTa9E',
  WORKER_URL_BRIDGE: 'https://kataclimb-stream-bridge.marconescatelli.workers.dev',
  REDIRECT_TO: 'https://kataclimb.com/monitor.html',
};

/* ═══════════════════════════════════════════════════════════
   COSTANTI KATA — Lista Kata v2 (vedi KataClimb_Lista_Kata_v2.md)
   12 Kata della prima lezione = soglia 1 (parziale, 7) + soglia 2 (5)
   ═══════════════════════════════════════════════════════════ */
const KATA_PRIMA_LEZIONE = [
  {n:1,  name:'Il Pronti'},
  {n:2,  name:'Atterraggio'},
  {n:3,  name:'Il Gradino'},
  {n:4,  name:'Lo Scorrere'},
  {n:5,  name:'Il Piombo'},
  {n:6,  name:"Blocco dell'Asse"},
  {n:7,  name:"Angolo d'Incidenza in Parete"},
  {n:11, name:'Appendersi (Fiducia)'},
  {n:12, name:'Andare su Corda'},
  {n:13, name:'Altalena'},
  {n:14, name:'Progressione Appendersi Alto'},
  {n:15, name:'Pendoli'},
];

const ROLES_CAN_UPLOAD = ['creator','admin','maestro','istruttore','istruttore_tutor','istruttore_senior','istruttore_jr','assistente','monitor','segreteria'];

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
let sb = null;
let session = null;
let me = null; // profile del monitor loggato
let allievoCorrente = null;
let videoCorrenti = {}; // mappa {kata_num: count_videos}
let videoLastByKata = {}; // mappa {kata_num: {stream_uid, uploaded_at, slot, id}} — ultimo video per "Rifai"
const REDO_WINDOW_MIN = 10; // finestra "Rifai ultimo video" (allineata a Worker stream-bridge)
let searchTimer = null;
let uploadTarget = null; // {kata_num}
let uploadFile = null;

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
async function init() {
  if (CFG.SUPABASE_URL.startsWith('PLACEHOLDER')) {
    showLoginMsg('Configurazione non completata. Sostituire SUPABASE_URL e SUPABASE_ANON_KEY in monitor.html prima del deploy.', 'err');
    return;
  }
  sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);

  // Gestisci callback magic link
  const hash = window.location.hash;
  if (hash && (hash.includes('access_token') || hash.includes('type=magiclink'))) {
    const { data: { session: s }, error } = await sb.auth.getSession();
    if (error) console.warn('Auth callback error:', error.message);
    if (s) {
      session = s;
      history.replaceState(null, '', window.location.pathname);
      await afterLogin();
      return;
    }
  }

  // Sessione esistente?
  const { data: { session: s2 } } = await sb.auth.getSession();
  if (s2) {
    session = s2;
    await afterLogin();
    return;
  }

  // Nessuna sessione → mostra login
  showScreen('login');
}

/* ═══════════════════════════════════════════════════════════
   AUTH
   ═══════════════════════════════════════════════════════════ */
async function sendMagicLink() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  if (!email || !email.includes('@')) {
    showLoginMsg('Inserisci un\'email valida.', 'err');
    return;
  }
  const btn = document.getElementById('btn-send-link');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> Invio…';
  try {
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: CFG.REDIRECT_TO }
    });
    if (error) throw error;
    showLoginMsg('Controlla la tua email: ti abbiamo mandato un link di accesso.', 'ok');
    btn.textContent = 'Link inviato ✓';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Mandami un altro link'; }, 8000);
  } catch (e) {
    console.error(e);
    showLoginMsg('Errore: ' + (e.message || 'invio fallito'), 'err');
    btn.disabled = false;
    btn.textContent = 'Mandami un link';
  }
}

async function afterLogin() {
  // Carica profile del monitor
  const { data: prof, error } = await sb.from('profiles')
    .select('user_id,nome,cognome,role')
    .eq('user_id', session.user.id)
    .single();
  if (error || !prof) {
    toast('Profilo non trovato. Contatta l\'amministratore.', true);
    await sb.auth.signOut();
    showScreen('login');
    return;
  }
  if (!ROLES_CAN_UPLOAD.includes(prof.role)) {
    toast('Il tuo account non ha i permessi per caricare video. (role: ' + prof.role + ')', true);
    await sb.auth.signOut();
    showScreen('login');
    return;
  }
  me = prof;
  document.getElementById('me-name').textContent = (prof.nome || '') + ' ' + (prof.cognome || '');
  document.getElementById('hdr').classList.remove('hidden');
  showScreen('app');
  document.getElementById('search-input').focus();
}

async function doLogout() {
  await sb.auth.signOut();
  session = null;
  me = null;
  allievoCorrente = null;
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('me-name').textContent = '—';
  document.getElementById('login-email').value = '';
  document.getElementById('login-msg').innerHTML = '';
  showScreen('login');
}

/* ═══════════════════════════════════════════════════════════
   SCREEN HANDLING
   ═══════════════════════════════════════════════════════════ */
function showScreen(id) {
  document.getElementById('screen-login').classList.toggle('hidden', id !== 'login');
  document.getElementById('screen-app').classList.toggle('hidden', id !== 'app');
  document.getElementById('screen-allievo').classList.toggle('hidden', id !== 'allievo');
}

function backToSearch() {
  allievoCorrente = null;
  showScreen('app');
}

/* ═══════════════════════════════════════════════════════════
   SEARCH ALLIEVI
   ═══════════════════════════════════════════════════════════ */
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(searchAllievi, 250);
}

async function searchAllievi() {
  const q = document.getElementById('search-input').value.trim();
  const wrap = document.getElementById('search-results');
  if (!q || q.length < 2) {
    wrap.innerHTML = '<div class="empty">Inizia digitando per cercare un allievo.</div>';
    return;
  }
  wrap.innerHTML = '<div class="empty"><span class="loader"></span></div>';

  // Cerca su nome, cognome o telefono
  const isNumeric = /^[0-9+\s]+$/.test(q);
  let query = sb.from('profiles').select('user_id,nome,cognome,telefono,struttura,role').limit(20);

  if (isNumeric) {
    query = query.ilike('telefono', `%${q.replace(/\s/g,'')}%`);
  } else {
    query = query.or(`nome.ilike.%${q}%,cognome.ilike.%${q}%`);
  }

  const { data, error } = await query;
  if (error) {
    wrap.innerHTML = `<div class="empty">Errore: ${error.message}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    wrap.innerHTML = '<div class="empty">Nessun allievo trovato.</div>';
    return;
  }
  wrap.innerHTML = data.map(p => `
    <div class="allievo-row" onclick="openAllievo('${p.user_id}')">
      <div>
        <div class="name">${esc(p.nome || '')} ${esc(p.cognome || '')}</div>
        <div class="meta">${esc(p.telefono || '—')} · ${esc(p.struttura || 'Accademia RCC')} · ${esc(p.role || 'allievo')}</div>
      </div>
      <div class="arrow">→</div>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════════════════════
   DETAIL ALLIEVO
   ═══════════════════════════════════════════════════════════ */
async function openAllievo(userId) {
  // Carica profile
  const { data: prof, error } = await sb.from('profiles')
    .select('user_id,nome,cognome,telefono,struttura,role,data_prima_lezione')
    .eq('user_id', userId).single();
  if (error || !prof) { toast('Allievo non trovato', true); return; }
  allievoCorrente = prof;

  // Carica conteggio video per Kata + traccia ultimo video per "Rifai"
  const { data: vids } = await sb.from('kata_videos')
    .select('id,kata_num,slot,status,stream_uid,uploaded_at')
    .eq('user_id', userId);
  videoCorrenti = {};
  videoLastByKata = {};
  (vids || []).forEach(v => {
    videoCorrenti[v.kata_num] = (videoCorrenti[v.kata_num] || 0) + 1;
    // Tieni traccia del video con slot più alto (l'ultimo caricato in ordine di progressione)
    const cur = videoLastByKata[v.kata_num];
    if (!cur || (v.slot || 0) > (cur.slot || 0)) {
      videoLastByKata[v.kata_num] = { id: v.id, stream_uid: v.stream_uid, uploaded_at: v.uploaded_at, slot: v.slot };
    }
  });

  renderAllievo();
  showScreen('allievo');
}

function renderAllievo() {
  const p = allievoCorrente;
  document.getElementById('allievo-card').innerHTML = `
    <div class="nm">${esc(p.nome || '')} ${esc(p.cognome || '')}</div>
    <div class="info">${esc(p.telefono || '—')} · ${esc(p.struttura || 'Accademia RCC')}${p.data_prima_lezione ? ' · 1ª lezione: ' + p.data_prima_lezione : ''}</div>
  `;
  const grid = document.getElementById('kata-grid');
  grid.innerHTML = KATA_PRIMA_LEZIONE.map(k => {
    const count = videoCorrenti[k.n] || 0;
    const full = count >= 5;
    const badge = count > 0
      ? `<span class="badge ${full ? 'full' : ''}">${count}/5 video</span>`
      : `<span class="badge" style="background:rgba(0,0,0,.04);color:var(--text3)">0/5</span>`;
    // Mostra "↻" se c'è almeno un video caricato e l'ultimo è entro la finestra
    const last = videoLastByKata[k.n];
    let canRedo = false;
    if (last && last.stream_uid && last.uploaded_at) {
      const ageMin = (Date.now() - new Date(last.uploaded_at).getTime()) / 60000;
      canRedo = ageMin <= REDO_WINDOW_MIN;
    }
    const redoBtn = canRedo
      ? `<button class="redo-btn" onclick="event.stopPropagation();redoLastVideo(${k.n})" title="Rifai ultimo video (entro ${REDO_WINDOW_MIN} min)">↻ rifai</button>`
      : '';
    return `
      <div class="kata-tile" onclick="${full ? 'toast(\'Tutti i 5 slot sono pieni\',true)' : `openUpload(${k.n})`}">
        <div class="kn">Kata ${String(k.n).padStart(2,'0')}</div>
        <div class="kt">${esc(k.name)}</div>
        ${badge}
        ${redoBtn}
      </div>
    `;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════
   REDO ULTIMO VIDEO (entro REDO_WINDOW_MIN minuti)
   ═══════════════════════════════════════════════════════════ */
async function redoLastVideo(kataNum) {
  const last = videoLastByKata[kataNum];
  if (!last || !last.stream_uid) {
    toast('Nessun video da rifare', true);
    return;
  }
  // Verifica timing client-side
  const ageMin = (Date.now() - new Date(last.uploaded_at).getTime()) / 60000;
  if (ageMin > REDO_WINDOW_MIN) {
    toast(`Tempo scaduto: l'ultimo video ha ${ageMin.toFixed(0)} min, max ${REDO_WINDOW_MIN}`, true);
    return;
  }
  if (!confirm(`Cancellare l'ultimo video del Kata ${kataNum} di ${allievoCorrente.nome}? Lo potrai rifare subito.`)) return;

  try {
    const res = await fetch(CFG.WORKER_URL_BRIDGE + '/delete', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token
      },
      body: JSON.stringify({ stream_uid: last.stream_uid })
    });
    const data = await res.json();
    if (!res.ok) {
      toast('Errore: ' + (data.error || data.detail || 'unknown'), true);
      return;
    }
    toast('Video cancellato — ora puoi rifarlo');
    // Refresh dell'allievo
    await openAllievo(allievoCorrente.user_id);
  } catch (e) {
    toast('Errore di rete: ' + e.message, true);
  }
}

/* ═══════════════════════════════════════════════════════════
   UPLOAD
   ═══════════════════════════════════════════════════════════ */
function openUpload(kataNum) {
  const k = KATA_PRIMA_LEZIONE.find(x => x.n === kataNum);
  if (!k) return;
  uploadTarget = { kata_num: kataNum };
  uploadFile = null;
  document.getElementById('up-title').textContent = `Kata ${String(k.n).padStart(2,'0')} — ${k.name}`;
  document.getElementById('up-sub').textContent = `Allievo: ${allievoCorrente.nome || ''} ${allievoCorrente.cognome || ''} · slot ${(videoCorrenti[kataNum] || 0) + 1}/5`;
  document.getElementById('up-fname').classList.add('hidden');
  document.getElementById('up-fname').textContent = '';
  document.getElementById('up-prog').classList.add('hidden');
  document.getElementById('up-fill').style.width = '0%';
  document.getElementById('up-text').textContent = 'Caricamento…';
  document.getElementById('up-submit').disabled = true;
  document.getElementById('up-file').value = '';
  document.getElementById('modal-upload').classList.remove('hidden');
}

function closeUpload() {
  uploadTarget = null;
  uploadFile = null;
  document.getElementById('modal-upload').classList.add('hidden');
}

function onFilePicked(e) {
  const f = e.target.files[0];
  if (!f) return;
  // Non blocchiamo per dimensione: il limite vero è duration (12s lato Stream)
  uploadFile = f;
  const fn = document.getElementById('up-fname');
  fn.textContent = '📹 ' + f.name + ' · ' + (f.size / 1024 / 1024).toFixed(1) + ' MB';
  fn.classList.remove('hidden');
  document.getElementById('up-submit').disabled = false;
}

async function doUpload() {
  if (!uploadFile || !uploadTarget) return;
  const submit = document.getElementById('up-submit');
  submit.disabled = true;
  submit.innerHTML = '<span class="loader"></span>';
  document.getElementById('up-prog').classList.remove('hidden');
  document.getElementById('up-fill').style.width = '5%';
  document.getElementById('up-text').textContent = 'Richiesta upload URL…';

  try {
    // 1. Chiama Worker /upload-url per ottenere URL diretto a Cloudflare Stream
    const r = await fetch(`${CFG.WORKER_URL_BRIDGE}/upload-url`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        user_id: allievoCorrente.user_id,
        kata_num: uploadTarget.kata_num
      })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Errore Worker');

    // 2. Upload diretto a Cloudflare Stream tramite l'URL ricevuto
    document.getElementById('up-text').textContent = 'Caricamento video…';
    document.getElementById('up-fill').style.width = '15%';

    const fd = new FormData();
    fd.append('file', uploadFile);
    const xhr = new XMLHttpRequest();
    const uploadPromise = new Promise((resolve, reject) => {
      xhr.upload.addEventListener('progress', (ev) => {
        if (ev.lengthComputable) {
          const pct = 15 + Math.round((ev.loaded / ev.total) * 75);
          document.getElementById('up-fill').style.width = pct + '%';
        }
      });
      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) resolve();
        else reject(new Error('Upload Stream fallito (HTTP ' + xhr.status + ')'));
      });
      xhr.addEventListener('error', () => reject(new Error('Errore di rete durante upload')));
      xhr.open('POST', data.upload_url);
      xhr.send(fd);
    });
    await uploadPromise;

    document.getElementById('up-fill').style.width = '100%';
    document.getElementById('up-text').textContent = 'Video caricato. Elaborazione in corso…';

    // 3. Aggiorna conteggio locale (anche se webhook arriverà tra ~30s, intanto aggiorniamo UI)
    videoCorrenti[uploadTarget.kata_num] = (videoCorrenti[uploadTarget.kata_num] || 0) + 1;

    setTimeout(() => {
      closeUpload();
      renderAllievo();
      toast('Video caricato! L\'elaborazione richiede ~30 secondi.');
    }, 1200);
  } catch (e) {
    console.error(e);
    document.getElementById('up-text').textContent = 'Errore: ' + e.message;
    submit.innerHTML = 'Riprova';
    submit.disabled = false;
    setTimeout(() => {
      document.getElementById('up-prog').classList.add('hidden');
    }, 4000);
  }
}

/* ═══════════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════════ */
function showLoginMsg(text, kind) {
  document.getElementById('login-msg').innerHTML = `<div class="${kind === 'err' ? 'msg-err' : 'msg-ok'}">${esc(text)}</div>`;
}

function toast(text, isErr) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => { t.className = 'toast' + (isErr ? ' err' : ''); }, 3500);
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.addEventListener('DOMContentLoaded', init);
</script>

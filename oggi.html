<style>

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{

a{color:inherit; text-decoration:none}

#gate h1{font-family:'Cormorant Garamond',serif; font-weight:500; font-size:1.8rem; margin-bottom:10px}

.console{display:grid; grid-template-columns:repeat(3,1fr); gap:7px; padding:0 12px}
.full{grid-column:1/-1}
.due{grid-column:span 2}
.zona{grid-column:1/-1; padding:4px 2px 0; color:var(--grigio); font-weight:800; font-size:.56rem; display:flex; align-items:center; gap:8px}

.t{

.t .et{font-weight:800; font-size:.52rem; margin-bottom:auto; opacity:.95}

.t-adesso .cosa{flex:1}

.t-avviso .big{font-size:1.05rem}

.t-malaga{background:linear-gradient(145deg,#FFD60A,#FF9F0A 75%,#FF7A00); border:none; color:#1A1200}

.t-uscita{background:linear-gradient(140deg,#0A84FF,#0040C1); border:none}

.t-sent .et{color:var(--grigio)}
.t-sent .cmd{color:var(--corpo)}
.fnodi{display:flex; gap:4px; margin-top:2px; flex-wrap:wrap}
.fn{width:8px; height:8px; border-radius:50%; border:1.2px solid var(--c)}

</style>

/* Trappola #134: date locali, MAI toISOString */
function isoLocal(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dLoc(s){ // 'YYYY-MM-DD' -> Date locale a mezzanotte
  const[p1,p2,p3]=String(s).slice(0,10).split('-').map(Number);
  return new Date(p1,p2-1,p3);
}

  sb=window.supabase.createClient(CFG.SB_URL,CFG.SB_KEY);

  uid=session.user.id;

  /* profilo: nome/role/kata_certs da profiles, corso/residue/staff_role da profile_data (come agenda live) */

    sb.from('profiles').select('nome, cognome, role, kata_certs').eq('user_id',uid).maybeSingle(),

  ]);
  profilo=rp.data||{};
  pdata=rd.data||{};

  /* vista: override ?vista= (collaudo/switch creator), poi ruolo */
  const vParam=new URLSearchParams(window.location.search).get('vista');

  document.getElementById('app').style.display='block';

  if(vista==='segreteria'){ renderSegreteria(); loadSegAdesso(); loadSegSala(); loadSegCode(); loadIstrValida(); loadEventi(); }

  else { renderAllievo(); loadAdesso(); loadSentiero(); loadEventi(); mostraDichiarazione(); }

async function loadAdesso(){

      .select('id, data_lezione, stato, tipo_corso, corsi_attivi_settimanali(giorno_settimana, ora_inizio, ora_fine, istruttori(nome))')
      .eq('user_id',uid).eq('stato','prenotato')
      .gte('data_lezione',oggiIso)
      .order('data_lezione',{ascending:true})
      .limit(1);
    if(error)throw error;
    const p=(data||[])[0];
    const residue=pdata.lezioni_residue;

    if(p){
      const cas=p.corsi_attivi_settimanali||{};
      const ora=(cas.ora_inizio||'').slice(0,5)||'—';

        <div class="ora">${esc(ora)}</div>

        </div>
        ${typeof residue==='number'?`<div class="bell">🔔 ${residue} lez</div>`:''}`;
    }else if(pdata.corso_attivo && typeof residue==='number' && residue>0){
      el.classList.add('pulsa');
      el.innerHTML=`
        <div class="ora">${residue}</div>
        <div class="cosa">
          <b>PRENOTA LA PROSSIMA.</b>
          <span>Hai ${residue} ${residue===1?'lezione':'lezioni'} che ti aspettano</span>
        </div>`;
    }else{

    console.error('[adesso]',e);

/* ── SENTIERO + PROSSIMO + MEMORIA + PAROLA: una sola query kata_videos ── */
async function loadSentiero(){
  try{
    const{data:v,error}=await sb.from('kata_videos').select('*').eq('user_id',uid);
    if(error)throw error;
    const vids=(v||[]).filter(x=>x.status!=='error');
    const perKata={};
    vids.forEach(x=>{ (perKata[x.kata_num]=perKata[x.kata_num]||[]).push(x); });
    const vissuti=Object.keys(perKata).map(Number).sort((a,b)=>a-b);
    const certs=new Set(
      Array.isArray(profilo.kata_certs)?profilo.kata_certs.map(Number):
      vids.filter(x=>x.status==='certified').map(x=>Number(x.kata_num))
    );
    document.getElementById('sent-num').innerHTML=vissuti.length+'<small>/33</small>';
    const nodi=[];
    FASCE.forEach(f=>{
      const campioni=f.da===33?[33]:[f.da, Math.floor((f.da+f.a)/2)];
      campioni.forEach(k=>{
        const cls=certs.has(k)?'o':(perKata[k]?'f':'');
        nodi.push(`<span class="fn ${cls}" style="--c:${f.c}"></span>`);
      });
    });
    document.getElementById('sent-nodi').innerHTML=nodi.join('');
    let next=null;
    for(let k=1;k<=33;k++){ if(!perKata[k]){next=k;break;} }
    document.getElementById('kata-next').textContent=next?('KATA '+String(next).padStart(2,'0')):'COMPLETO';
    const ptxt=document.getElementById('parola-txt'), pk=document.getElementById('parola-k');
    const kRef=next||33;
    if(PAROLE[kRef]){ ptxt.textContent=PAROLE[kRef]; pk.textContent='KATA '+String(kRef).padStart(2,'0')+' ›'; }
    else{ ptxt.textContent=KN[kRef]||''; pk.textContent='KATA '+String(kRef).padStart(2,'0')+' ›'; }
    const conData=vids.filter(x=>x.uploaded_at).sort((a,b)=>new Date(a.uploaded_at)-new Date(b.uploaded_at));
    if(conData.length){
      const primo=conData[0], ultimo=conData[conData.length-1];
      const cell=(x,oro)=>`<div class="v${oro?' oro':''}" ${x.thumbnail_url?`style="background-image:url('${esc(x.thumbnail_url)}')`+`"`:''}>${x.thumbnail_url?'':'▶'}</div>`;
      document.getElementById('mem-vv').innerHTML=cell(primo,false)+cell(ultimo,true);
    }
  }catch(e){ console.error('[sentiero]',e); }
}

async function loadIstrLezioni(){
  const adesso=document.getElementById('t-adesso');
  const righe=document.getElementById('lez-righe');
  try{
    /* T#149: corsi_attivi_settimanali.istruttore_id -> istruttori.id, lookup da user_id (come agenda live) */
    const{data:istr}=await sb.from('istruttori').select('id').eq('user_id',uid).maybeSingle();
    const iid=istr?.id||null;
    if(!iid){
      adesso.classList.add('calmo');
      adesso.innerHTML=`<div class="cosa"><b>RESPIRA.</b><span>Nessuna riga istruttore collegata al tuo profilo</span></div>`;
      righe.innerHTML=`<div class="vuota">—</div>`;
      return;
    }
    const{data:slots,error}=await sb.from('corsi_attivi_settimanali')
      .select('id, giorno_settimana, ora_inizio, ora_fine, tipo_corso, capienza_max')
      .eq('status','attivo').eq('istruttore_id',iid);
    if(error)throw error;

    const now=new Date();
    const gOggi=gsOggi(now);
    const hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    const oggiIso=isoLocal(now);
    const slotsOggi=(slots||[]).filter(s=>s.giorno_settimana===gOggi)
      .sort((a,b)=>String(a.ora_inizio).localeCompare(String(b.ora_inizio)));

    /* prenotati di oggi sui miei slot */
    const conteggi={};
    if(slotsOggi.length){
      const ids=slotsOggi.map(s=>s.id);
      const{data:pr}=await sb.from('prenotazioni_corso')
        .select('slot_id').eq('data_lezione',oggiIso).eq('stato','prenotato').in('slot_id',ids);
      (pr||[]).forEach(x=>{conteggi[x.slot_id]=(conteggi[x.slot_id]||0)+1;});
    }

    /* righe di oggi */
    if(slotsOggi.length){
      righe.innerHTML=slotsOggi.map(s=>{
        const tipo=s.tipo_corso||'';
        const cls=TIPO_LBL[tipo]?tipo:'altro';
        return `<div class="riga"><span class="h">${esc(String(s.ora_inizio).slice(0,5))}</span>`+
          `<span class="tag ${cls}">${esc(TIPO_LBL[tipo]||tipo)}</span>`+
          `<span class="n">${conteggi[s.id]||0}/${s.capienza_max??'—'}</span></div>`;
      }).join('');
    }else{
      righe.innerHTML=`<div class="vuota">Oggi nessuna lezione tua.</div>`;
    }

    /* ADESSO: prossima lezione di oggi non ancora finita, altrimenti prossimo giorno con slot */
    const prossOggi=slotsOggi.find(s=>String(s.ora_fine).slice(0,5)>hhmm);
    if(prossOggi){
      adesso.classList.add('pulsa');
      adesso.innerHTML=`
        <div class="ora">${esc(String(prossOggi.ora_inizio).slice(0,5))}</div>
        <div class="cosa">
          <b>IN SALA.</b>
          <span>${esc(TIPO_LBL[prossOggi.tipo_corso]||prossOggi.tipo_corso||'')} · ${conteggi[prossOggi.id]||0} prenotati · Accademia RCC</span>
        </div>
        <div class="bell">${slotsOggi.length} lez oggi</div>`;
    }else{
      /* prossimo giorno con uno slot (entro 7) */
      let trovato=null;
      for(let i=1;i<=7 && !trovato;i++){
        const d=new Date(now); d.setDate(d.getDate()+i);
        const g=gsOggi(d);
        const s=(slots||[]).filter(x=>x.giorno_settimana===g)
          .sort((a,b)=>String(a.ora_inizio).localeCompare(String(b.ora_inizio)))[0];
        if(s)trovato={s,d};
      }
      if(trovato){
        adesso.classList.add('pulsa');
        adesso.innerHTML=`
          <div class="ora">${esc(String(trovato.s.ora_inizio).slice(0,5))}</div>
          <div class="cosa">
            <b>TI ASPETTANO ${GIORNI[trovato.d.getDay()]} ${trovato.d.getDate()}</b>
            <span>${esc(TIPO_LBL[trovato.s.tipo_corso]||trovato.s.tipo_corso||'')} · Accademia RCC</span>
          </div>`;
      }else{
        adesso.classList.add('calmo');
        adesso.innerHTML=`<div class="cosa"><b>RESPIRA.</b><span>Nessuna lezione in calendario</span></div>`;
      }
    }
  }catch(e){
    adesso.innerHTML=`<div class="cosa"><b>APRI L'AGENDA</b><span>Non riesco a leggere le lezioni ora</span></div>`;
    righe.innerHTML=`<div class="vuota">—</div>`;
    console.error('[istr-lezioni]',e);
  }
}

/* ════════════════════════ EVENTI: condivisa da tutte le viste ════════════════════════ */
async function loadEventi(){
  try{
    const r=await fetch(CFG.SB_URL+'/rest/v1/rpc/get_eventi_calendario',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':CFG.SB_KEY,'Authorization':'Bearer '+CFG.SB_KEY},body:'{}'});
    if(!r.ok)throw new Error('rpc '+r.status);
    const ev=await r.json();
    const oggi=new Date(); oggi.setHours(0,0,0,0);
    let fut=(ev||[]).filter(e=>dLoc(e.data_inizio)>=oggi).sort((a,b)=>dLoc(a.data_inizio)-dLoc(b.data_inizio));
    /* dedupe v1.1: stessa data_inizio+tipo = stesso evento */
    const visti=new Set();
    fut=fut.filter(e=>{const k=e.data_inizio+'|'+e.tipo; if(visti.has(k))return false; visti.add(k); return true;});
    const T={viaggio:'✈',uscita_adulti:'⛰',uscita_ragazzi:'🧗',evento:'◆'};
    const fill=(id,e)=>{
      const el=document.getElementById(id); if(!el)return;
      if(!e){
        /* v2.0: niente buco — con un solo evento la seconda tessera diventa la scorciatoia EVENTI */
        el.href='/eventi.html';
        el.innerHTML=`
          <span class="et mono">✈ Eventi</span>
          <div class="big">◆</div>
          <span class="cmd mono">TUTTI ›</span>`;
        return;
      }
      const gg=Math.max(0,Math.round((dLoc(e.data_inizio)-oggi)/86400000));
      el.href='/evento.html?slug='+encodeURIComponent(e.slug);
      el.innerHTML=`
        <span class="et mono">${T[e.tipo]||'◆'} ${esc((e.nome||'').split('—')[0].trim().slice(0,14))}</span>
        <div class="big">${gg}<small>g</small></div>
        <span class="cmd mono">${e.n_iscritti>0?e.n_iscritti+' IN CORDATA ›':'GUARDA ›'}</span>`;
    };
    fill('t-ev1',fut[0]); fill('t-ev2',fut[1]);
  }catch(e){ console.error('[eventi]',e); }
}

/* ── DICHIARATI v1: solo locale, in attesa della decisione sulla struttura DB ── */
function dichiara(stato,emo){
  try{
    const k='kc_dichiarazioni';
    const log=JSON.parse(localStorage.getItem(k)||'[]');
    log.push({stato,emo,giorno:isoLocal(new Date()),quando:new Date().toISOString()});
    localStorage.setItem(k,JSON.stringify(log.slice(-90)));
  }catch(_){}
  mostraDichiarazione();
  toast(emo+' '+stato+'. Annotato — resta sul tuo telefono.');
}
function mostraDichiarazione(){
  try{
    const log=JSON.parse(localStorage.getItem('kc_dichiarazioni')||'[]');
    const oggi=isoLocal(new Date());
    const ultima=[...log].reverse().find(x=>x.giorno===oggi);
    const el=document.getElementById('asc-stato');
    if(el&&ultima){el.textContent='OGGI: '+(ultima.emo||'')+' '+ultima.stato.toUpperCase();el.style.color='var(--cordata)';}
  }catch(_){}
}
